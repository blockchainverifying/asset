<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudStream Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .live-indicator {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans">

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">CloudStream HTML</h1>
                    <p id="app-id-display" class="text-xs text-slate-400">Loading config...</p>
                </div>
            </div>

            <div id="status-badge" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-800 border border-slate-700">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
                <span id="status-text" class="text-sm font-medium capitalize">Connecting</span>
            </div>
        </header>

        <!-- Main Stream Area -->
        <main class="w-full flex flex-col items-center">
            <div class="relative w-full aspect-video bg-black rounded-2xl border border-slate-700 overflow-hidden shadow-2xl flex items-center justify-center">
                
                <!-- Loading State -->
                <div id="loading-spinner" class="flex flex-col items-center gap-4">
                    <svg class="animate-spin h-10 w-10 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p class="text-slate-400 italic">Connecting to stream...</p>
                </div>

                <!-- Live Image -->
                <img id="stream-img" src="" alt="Screen Stream" class="hidden w-full h-full object-contain">

                <!-- Error/Empty State -->
                <div id="empty-state" class="hidden text-center p-8">
                    <svg class="mx-auto mb-4 text-slate-500" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 2l20 20"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                    <h2 class="text-2xl font-semibold mb-2">Stream Offline</h2>
                    <p class="text-slate-400 max-w-md">The broadcaster is not currently transmitting or the path is incorrect.</p>
                </div>

                <div id="live-tag" class="hidden absolute top-4 left-4 bg-red-600 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider live-indicator">
                    Live
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4 w-full">
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                    <h3 class="text-slate-400 text-xs font-semibold uppercase mb-1">Auth Status</h3>
                    <p id="auth-status" class="text-sm italic text-slate-300">Authenticating...</p>
                </div>
                <div id="user-info" class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                    <h3 class="text-slate-400 text-xs font-semibold uppercase mb-1">Device UID</h3>
                    <p id="uid-text" class="text-xs truncate font-mono">---</p>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700/50">
                    <h3 class="text-slate-400 text-xs font-semibold uppercase mb-1">Refresh Rate</h3>
                    <p class="text-sm">Real-time (Stream-driven)</p>
                </div>
            </div>
        </main>

        <footer class="mt-12 text-center text-slate-500 text-xs border-t border-slate-800 pt-8">
            Powered by Firebase Firestore & HTML5
        </footer>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Using your specific Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDYbGLAXKaY9uVyNPDCS-bvxsQvPWiLouk",
            authDomain: "sainfoxiya-com-a7733.firebaseapp.com",
            databaseURL: "https://sainfoxiya-com-a7733-default-rtdb.firebaseio.com",
            projectId: "sainfoxiya-com-a7733",
            storageBucket: "sainfoxiya-com-a7733.firebasestorage.app",
            messagingSenderId: "639762867502",
            appId: "1:639762867502:web:826662477ce123110fc6bf",
            measurementId: "G-0Q3FJ4WYZF"
        };

        const appId = "sainfoxiya-com-a7733";
        document.getElementById('app-id-display').innerText = `ID: ${appId}`;

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Elements
        const streamImg = document.getElementById('stream-img');
        const loadingSpinner = document.getElementById('loading-spinner');
        const emptyState = document.getElementById('empty-state');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const liveTag = document.getElementById('live-tag');
        const authStatus = document.getElementById('auth-status');
        const uidText = document.getElementById('uid-text');

        function updateStatus(state) {
            statusText.innerText = state;
            if (state === 'Live') {
                statusDot.className = 'w-2 h-2 rounded-full bg-green-500 live-indicator';
                liveTag.classList.remove('hidden');
            } else if (state === 'Waiting') {
                statusDot.className = 'w-2 h-2 rounded-full bg-yellow-500';
                liveTag.classList.add('hidden');
            } else {
                statusDot.className = 'w-2 h-2 rounded-full bg-red-500';
                liveTag.classList.add('hidden');
            }
        }

        // 1. Authenticate
        signInAnonymously(auth).then(() => {
            authStatus.innerText = "Authenticated Anonymously";
        }).catch(err => {
            console.error("Auth failed:", err);
            authStatus.innerText = "Auth Failed: " + err.message;
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                uidText.innerText = user.uid;
                startListening();
            }
        });

        // 2. Listen to Firestore
        function startListening() {
            // Updated Path to match your project ID structure
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'streams', 'live_screen');

            onSnapshot(docRef, (docSnap) => {
                loadingSpinner.classList.add('hidden');
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.frame) {
                        streamImg.src = data.frame;
                        streamImg.classList.remove('hidden');
                        emptyState.classList.add('hidden');
                        updateStatus('Live');
                    }
                } else {
                    streamImg.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    updateStatus('Waiting');
                }
            }, (error) => {
                console.error("Firestore Listen Error:", error);
                updateStatus('Error');
                loadingSpinner.classList.add('hidden');
                emptyState.classList.remove('hidden');
                authStatus.innerText = "Firestore Error: Check Rules";
            });
        }
    </script>
</body>
</html>
