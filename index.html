<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote System Control Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .screen-container { cursor: crosshair; position: relative; }
        #virtual-cursor {
            position: absolute;
            width: 14px;
            height: 14px;
            background: rgba(239, 68, 68, 0.9);
            border: 2px solid white;
            border-radius: 50%;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -50%);
            z-index: 50;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.6);
            transition: all 0.1s ease-out;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-900/20">
                    <i data-lucide="monitor" class="w-6 h-6 text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Remote <span class="text-blue-500">Admin Pro</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button id="reset-btn" class="text-xs bg-slate-800 hover:bg-red-900/40 text-slate-300 border border-slate-700 px-4 py-2 rounded-xl transition-all font-medium">
                    Reset & Sync
                </button>
                <div id="status-indicator" class="flex items-center gap-2 bg-slate-900 border border-slate-800 px-4 py-2 rounded-full text-sm">
                    <span class="relative flex h-3 w-3">
                        <span id="status-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500" id="status-dot"></span>
                    </span>
                    <span id="status-text" class="font-mono text-xs uppercase tracking-wider">Connecting...</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Screen Section -->
        <div class="lg:col-span-8 space-y-6">
            <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-2xl relative">
                <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 backdrop-blur-sm">
                    <span class="text-xs font-bold uppercase tracking-widest text-blue-400 flex items-center gap-2">
                        <i data-lucide="mouse-pointer-2" class="w-4 h-4"></i> Remote Display
                    </span>
                    <span class="text-[10px] text-slate-500">Click to interaction</span>
                </div>
                <div class="relative screen-container group" id="screen-click-area">
                    <div id="virtual-cursor"></div>
                    <img id="main-screen" src="" alt="Waiting..." class="w-full h-auto min-h-[450px] bg-black object-contain transition-opacity duration-500" />
                    <div id="screen-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900">
                        <div class="relative">
                            <i data-lucide="monitor-off" class="w-12 h-12 text-slate-800 mb-4"></i>
                            <div class="absolute inset-0 animate-pulse bg-blue-500/10 rounded-full blur-2xl"></div>
                        </div>
                        <p class="text-slate-500 text-sm animate-pulse">Establishing secure link to agent...</p>
                    </div>
                </div>
            </div>

            <!-- Input Controls -->
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl space-y-4">
                <div class="flex gap-3">
                    <div class="relative flex-1">
                        <input type="text" id="keyboard-input" 
                            placeholder="Type commands or text..." 
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-sm transition-all" />
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] text-slate-600 font-mono">UTF-8</div>
                    </div>
                    <button id="send-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-xl font-bold flex items-center gap-2 transition-all active:scale-95 shadow-lg shadow-blue-900/40">
                        <span>SEND</span>
                        <i data-lucide="chevron-right" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="flex flex-wrap gap-2 pt-2">
                    <button id="enter-btn" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-5 py-3 rounded-xl text-sm font-semibold flex items-center gap-2 border border-slate-700 transition-colors">
                        <i data-lucide="corner-down-left" class="w-4 h-4 text-blue-400"></i> ENTER
                    </button>
                    <button id="backspace-btn" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-5 py-3 rounded-xl text-sm font-semibold flex items-center gap-2 border border-slate-700 transition-colors">
                        <i data-lucide="delete" class="w-4 h-4 text-red-400"></i> BACKSPACE
                    </button>
                </div>
            </div>
        </div>

        <!-- Sidebar Section -->
        <div class="lg:col-span-4 space-y-6">
            <!-- Camera Feed -->
            <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-xl">
                <div class="p-4 bg-slate-800/30 border-b border-slate-800 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i data-lucide="video" class="w-4 h-4 text-pink-500"></i>
                        <span class="text-sm font-bold uppercase tracking-tight">Agent Camera</span>
                    </div>
                    <button id="toggle-cam" class="text-[10px] font-bold bg-red-500/10 text-red-500 px-3 py-1.5 rounded-lg border border-red-500/20 hover:bg-red-500/20 transition-all">
                        STOP FEED
                    </button>
                </div>
                <div class="aspect-video bg-black flex items-center justify-center relative group">
                    <img id="camera-feed" src="" class="w-full h-full object-cover hidden" />
                    <div id="camera-placeholder" class="text-slate-700 text-xs flex flex-col items-center gap-2">
                        <i data-lucide="eye-off" class="w-8 h-8 opacity-20"></i>
                        <span>Feed Restricted or Offline</span>
                    </div>
                </div>
            </div>

            <!-- Clipboard -->
            <div class="bg-slate-900 rounded-2xl border border-slate-800 flex flex-col h-[350px] shadow-xl">
                <div class="p-4 border-b border-slate-800 flex items-center gap-2">
                    <i data-lucide="copy" class="w-4 h-4 text-yellow-500"></i>
                    <span class="text-sm font-bold uppercase tracking-tight">Clipboard Sync</span>
                </div>
                <div class="p-4 flex-1 overflow-y-auto custom-scrollbar space-y-3" id="clipboard-container">
                    <div class="text-slate-600 text-center text-xs mt-20 italic">Listening for clipboard changes...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDYbGLAXKaY9uVyNPDCS-bvxsQvPWiLouk",
            authDomain: "sainfoxiya-com-a7733.firebaseapp.com",
            databaseURL: "https://sainfoxiya-com-a7733-default-rtdb.firebaseio.com",
            projectId: "sainfoxiya-com-a7733",
            storageBucket: "sainfoxiya-com-a7733.firebasestorage.app",
            messagingSenderId: "639762867502",
            appId: "1:639762867502:web:826662477ce123110fc6bf",
            measurementId: "G-0Q3FJ4WYZF"
        };

        const appId = 'sainfoxiya-com-a7733';
        const DOC_ID = 'system_state';

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const screenImg = document.getElementById('main-screen');
        const cameraImg = document.getElementById('camera-feed');
        const screenPlaceholder = document.getElementById('screen-placeholder');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const clipboardContainer = document.getElementById('clipboard-container');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const statusPing = document.getElementById('status-ping');
        const keyboardInput = document.getElementById('keyboard-input');
        const virtualCursor = document.getElementById('virtual-cursor');
        const screenArea = document.getElementById('screen-click-area');

        lucide.createIcons();

        async function init() {
            try {
                await auth.signInAnonymously();
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('remote_control').doc(DOC_ID);
                
                docRef.onSnapshot((doc) => {
                    if (doc.exists) updateUI(doc.data());
                }, (err) => {
                    statusText.innerText = "Access Denied";
                });

                statusText.innerText = "Link Established";
                statusDot.className = "relative inline-flex rounded-full h-3 w-3 bg-emerald-500";
                statusPing.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75";
            } catch (err) {
                statusText.innerText = "Fatal Error";
            }
        }

        function updateUI(data) {
            if (data.screen) {
                screenImg.src = `data:image/jpeg;base64,${data.screen}`;
                screenImg.classList.remove('hidden');
                screenPlaceholder.classList.add('hidden');
            }

            if (data.camera && !data.camera_off) {
                cameraImg.src = `data:image/jpeg;base64,${data.camera}`;
                cameraImg.classList.remove('hidden');
                cameraPlaceholder.classList.add('hidden');
            } else {
                cameraImg.classList.add('hidden');
                cameraPlaceholder.classList.remove('hidden');
            }

            if (data.clipboard) {
                clipboardContainer.innerHTML = `
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl group relative overflow-hidden">
                        <div class="absolute inset-y-0 left-0 w-1 bg-yellow-500/50"></div>
                        <p class="text-xs text-yellow-100/80 font-mono break-all leading-relaxed">${data.clipboard}</p>
                        <div class="mt-3 flex justify-between items-center">
                             <span class="text-[9px] text-slate-600 font-bold uppercase tracking-widest">Captured Now</span>
                             <button onclick="copyToDash('${data.clipboard.replace(/'/g, "\\'")}')" class="text-[10px] text-blue-400 font-black hover:text-blue-300 transition-colors">COPY STRING</button>
                        </div>
                    </div>
                `;
            }
        }

        async function sendCommand(command) {
            const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('remote_control').doc(DOC_ID);
            await docRef.update({ command: command });
        }

        screenArea.addEventListener('click', (e) => {
            const rect = screenImg.getBoundingClientRect();
            if (rect.width === 0) return;
            
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;

            virtualCursor.style.left = `${(x * 100)}%`;
            virtualCursor.style.top = `${(y * 100)}%`;
            virtualCursor.style.display = 'block';

            sendCommand({ type: 'click', x, y, time: Date.now() });
        });

        document.getElementById('send-btn').addEventListener('click', () => {
            if (keyboardInput.value) {
                sendCommand({ type: 'type', text: keyboardInput.value, time: Date.now() });
                keyboardInput.value = '';
            }
        });

        document.getElementById('enter-btn').addEventListener('click', () => sendCommand({ type: 'key', key: 'enter' }));
        document.getElementById('backspace-btn').addEventListener('click', () => sendCommand({ type: 'key', key: 'backspace' }));
        document.getElementById('reset-btn').addEventListener('click', () => {
            const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('remote_control').doc(DOC_ID);
            docRef.update({ command: null, camera_off: false });
            virtualCursor.style.display = 'none';
        });
        
        document.getElementById('toggle-cam').addEventListener('click', () => {
            const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('remote_control').doc(DOC_ID);
            docRef.update({ camera_off: true });
        });

        window.copyToDash = (text) => {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        };

        init();
    </script>
</body>
</html>
