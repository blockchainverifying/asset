<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Remote Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .screenshot-container {
            cursor: crosshair;
            position: relative;
            display: inline-block;
        }
        #dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background: red;
            border-radius: 50%;
            display: none;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans p-4">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-blue-400">💻 PC Dashboard</h1>
            <div class="space-x-2">
                <button onclick="refreshImage()" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-700">🔄 Refresh</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <!-- Sidebar Controls -->
            <div class="md:col-span-1 space-y-4">
                <div class="bg-gray-800 p-4 rounded-lg">
                    <h2 class="font-bold mb-2 border-b border-gray-700 pb-1">Commands</h2>
                    <input id="typeInput" type="text" placeholder="Type something..." class="w-full bg-gray-700 p-2 rounded mb-2 text-sm outline-none border border-gray-600 focus:border-blue-500">
                    <button onclick="sendType()" class="w-full bg-green-600 py-2 rounded text-sm hover:bg-green-700">⌨️ Send Text</button>
                </div>
                
                <div class="bg-gray-800 p-4 rounded-lg">
                    <h2 class="font-bold mb-2 border-b border-gray-700 pb-1">Info</h2>
                    <p class="text-xs text-gray-400">Image par click karein PC par click karne ke liye.</p>
                    <div id="coords" class="mt-2 text-blue-300 text-sm">X: 0, Y: 0</div>
                </div>
            </div>

            <!-- Main Screen -->
            <div class="md:col-span-3">
                <div class="bg-gray-800 p-2 rounded-lg text-center overflow-auto">
                    <div class="screenshot-container" id="container">
                        <!-- Yahan apna GitHub screenshot URL dalein -->
                        <img id="screenshot" src="screenshot.png" alt="Loading PC Screen..." class="max-w-full h-auto rounded shadow-2xl border border-gray-700">
                        <div id="dot"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8235734619:AAEVmjaTSbPBvzKZJuyCOgxXvOb_m5ILWxo";
        const CHAT_ID = "8060968649";
        const img = document.getElementById('screenshot');
        const container = document.getElementById('container');
        const dot = document.getElementById('dot');

        // Automatic image refresh every 30 seconds
        setInterval(refreshImage, 30000);

        function refreshImage() {
            img.src = "screenshot.png?t=" + new Date().getTime();
        }

        container.addEventListener('click', function(e) {
            const rect = img.getBoundingClientRect();
            
            // Mouse position relative to image
            const x_pixel = e.clientX - rect.left;
            const y_pixel = e.clientY - rect.top;

            // Mapping to standard PC Resolution (Yahan apna PC resolution dalein agar galat click ho)
            // Default 1920x1080 assume kar rahe hain, python code se width/height le sakte hain
            const pc_width = 1920; 
            const pc_height = 1080;

            const final_x = Math.round((x_pixel / rect.width) * pc_width);
            const final_y = Math.round((y_pixel / rect.height) * pc_height);

            document.getElementById('coords').innerText = `X: ${final_x}, Y: ${final_y}`;

            // Visual Dot
            dot.style.display = 'block';
            dot.style.left = x_pixel + 'px';
            dot.style.top = y_pixel + 'px';

            // Send to Telegram
            sendCommand(`/click ${final_x} ${final_y}`);
        });

        function sendType() {
            const text = document.getElementById('typeInput').value;
            if(text) {
                sendCommand(`/type ${text}`);
                document.getElementById('typeInput').value = '';
            }
        }

        function sendCommand(cmd) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(cmd)}`)
            .then(res => {
                console.log("Command Sent");
                // Click ke baad 2 sec baad refresh
                setTimeout(refreshImage, 2000);
            });
        }
    </script>
</body>
</html>
