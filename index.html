<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudStream Final Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .live-indicator { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        #remote-cursor { transition: all 0.1s ease-out; pointer-events: none; z-index: 50; }
        .key-btn { @apply bg-slate-700 hover:bg-slate-600 active:bg-slate-500 px-4 py-2 rounded text-xs font-bold border border-slate-600 shadow-sm transition-all; }
        .clipboard-item { @apply bg-slate-800 p-2 rounded text-[11px] border-l-2 border-blue-500 break-all relative group animate-in fade-in slide-in-from-right-2 duration-300; }
        .destruct-btn { @apply bg-red-900/30 hover:bg-red-600 text-red-500 hover:text-white border border-red-900/50 px-3 py-1.5 rounded text-[10px] font-black uppercase tracking-tighter transition-all; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col overflow-hidden">

    <!-- Header Section -->
    <header class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="font-bold text-lg flex items-center gap-2">
                <span class="bg-red-600 p-1.5 rounded shadow-lg">💻</span> 
                <span class="hidden sm:inline">Final Remote Panel</span>
            </h1>
            <button id="kill-switch" class="destruct-btn">Wipe Remote</button>
        </div>
        <div id="status-badge" class="flex items-center gap-2 px-3 py-1 rounded-full bg-slate-900 border border-slate-700 text-xs">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
            <span id="status-text" class="font-medium uppercase tracking-tighter">Connecting</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        <!-- Main Screen Streaming Area -->
        <div class="flex-[3] relative bg-black flex items-center justify-center p-2 overflow-hidden">
            <div id="screen-container" class="relative max-w-full max-h-full border border-slate-800 shadow-2xl cursor-crosshair">
                <img id="stream-img" src="" class="hidden max-w-full max-h-full block" draggable="false">
                
                <!-- Remote Cursor -->
                <div id="remote-cursor" class="absolute w-5 h-5 hidden">
                    <svg viewBox="0 0 24 24" fill="white" stroke="black" stroke-width="1.5">
                        <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
                    </svg>
                </div>

                <!-- Loading Spinner -->
                <div id="loader" class="absolute inset-0 flex items-center justify-center bg-slate-900">
                    <div class="text-center">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-red-500 mx-auto mb-4"></div>
                        <p class="text-slate-500 text-xs font-mono">WAITING FOR REMOTE...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar for Clipboard & Input -->
        <div class="flex-1 bg-slate-800 border-l border-slate-700 p-4 flex flex-col gap-4 overflow-y-auto shrink-0 md:w-80">
            
            <!-- Clipboard History -->
            <div class="bg-slate-900 rounded-xl p-4 border border-slate-700 shadow-inner">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-[10px] font-black text-blue-400 uppercase tracking-widest">📋 Clipboard Sync</h3>
                    <span class="text-[9px] text-slate-500 font-bold">10 MINS</span>
                </div>
                <div id="clipboard-list" class="flex flex-col gap-2 max-h-64 overflow-y-auto pr-1">
                    <p class="text-[11px] text-slate-600 italic text-center py-4">No clipboard data...</p>
                </div>
            </div>

            <!-- Remote Keyboard Input -->
            <div class="bg-slate-900 rounded-xl p-4 border border-slate-700 shadow-inner">
                <h3 class="text-[10px] font-black text-green-400 uppercase tracking-widest mb-3">⌨️ Remote Input</h3>
                <div class="flex flex-col gap-3">
                    <div class="relative">
                        <input type="text" id="keyboard-input" autocomplete="off" placeholder="Type and hit Send..." 
                            class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500 transition-all">
                        <button id="send-btn" class="absolute right-1.5 top-1.5 bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded text-[10px] font-bold transition-all">SEND</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="sendSpecialKey('enter')" class="key-btn">Enter</button>
                        <button onclick="sendSpecialKey('space')" class="key-btn">Space</button>
                        <button onclick="sendSpecialKey('backspace')" class="key-btn">Back</button>
                    </div>
                </div>
            </div>

            <!-- Help text -->
            <div class="mt-auto pt-4 text-center border-t border-slate-700">
                <p class="text-[9px] text-slate-500 uppercase font-bold leading-relaxed">
                    Left Click: Remote Click<br>
                    Wipe: Permanently remove script
                </p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDYbGLAXKaY9uVyNPDCS-bvxsQvPWiLouk", 
            authDomain: "sainfoxiya-com-a7733.firebaseapp.com", 
            projectId: "sainfoxiya-com-a7733", 
            storageBucket: "sainfoxiya-com-a7733.firebasestorage.app", 
            appId: "1:639762867502:web:826662477ce123110fc6bf" 
        };

        const appId = "sainfoxiya-com-a7733";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const streamImg = document.getElementById('stream-img');
        const screenContainer = document.getElementById('screen-container');
        const clipboardList = document.getElementById('clipboard-list');
        const remoteCursor = document.getElementById('remote-cursor');
        const loader = document.getElementById('loader');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const keyboardInput = document.getElementById('keyboard-input');

        signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => { if(user) initSync(); });

        // Remote command bhejne ka function
        async function sendAction(data) {
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'actions'), { 
                    ...data, timestamp: serverTimestamp(), processed: false 
                });
            } catch (err) { console.error("Action error:", err); }
        }

        // Wipe Remote Trigger
        document.getElementById('kill-switch').onclick = () => {
            const confirmed = confirm("WARNING: Yeh command Python script ko system startup aur source se permanently delete kar degi. Proceed?");
            if(confirmed) {
                sendAction({ type: 'self_destruct' });
                alert("Self-destruct command sent. Script will wipe itself shortly.");
            }
        };

        // Mouse Click Interaction
        screenContainer.addEventListener('click', (e) => {
            if(statusText.innerText !== 'LIVE') return;
            const rect = screenContainer.getBoundingClientRect();
            const relX = (e.clientX - rect.left) / rect.width;
            const relY = (e.clientY - rect.top) / rect.height;
            sendAction({ type: 'click', relX, relY });

            // Ripple Feedback
            const ripple = document.createElement('div');
            ripple.className = 'absolute w-6 h-6 border-2 border-white/50 rounded-full animate-ping pointer-events-none';
            ripple.style.left = `calc(${(relX * 100)}% - 12px)`;
            ripple.style.top = `calc(${(relY * 100)}% - 12px)`;
            screenContainer.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        });

        // Keyboard Handlers
        window.sendSpecialKey = (key) => sendAction({ type: 'special_key', value: key });
        const submitText = () => { 
            if(keyboardInput.value) { 
                sendAction({ type: 'text', value: keyboardInput.value }); 
                keyboardInput.value = ''; 
                keyboardInput.focus();
            } 
        };
        document.getElementById('send-btn').onclick = submitText;
        keyboardInput.onkeypress = (e) => { if(e.key === 'Enter') submitText(); };

        // Data Synchronization
        function initSync() {
            // Live Screen Listen
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'streams', 'live_screen'), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    streamImg.src = d.frame; 
                    streamImg.classList.remove('hidden'); 
                    loader.classList.add('hidden');
                    remoteCursor.style.left = (d.cursorX * 100) + '%';
                    remoteCursor.style.top = (d.cursorY * 100) + '%';
                    remoteCursor.classList.remove('hidden');
                    statusDot.className = 'w-2 h-2 rounded-full bg-green-500 live-indicator';
                    statusText.innerText = 'Live';
                }
            });

            // Clipboard Listen
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'clipboard'), orderBy('timestamp', 'desc'), limit(5));
            onSnapshot(q, (snap) => {
                clipboardList.innerHTML = '';
                const now = Date.now() / 1000;
                let itemsFound = 0;
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    if(data.expires_at > now) {
                        itemsFound++;
                        const div = document.createElement('div');
                        div.className = 'clipboard-item';
                        div.innerHTML = `<span>${data.text}</span><button class="hidden group-hover:inline-block ml-2 text-blue-400 font-bold text-[9px]" onclick="copyToLocal('${data.text.replace(/'/g, "\\'")}')">COPY</button>`;
                        clipboardList.appendChild(div);
                    }
                });
                if(itemsFound === 0) clipboardList.innerHTML = '<p class="text-[11px] text-slate-600 italic text-center py-4">No active data...</p>';
            });
        }

        // Local Clipboard Helper
        window.copyToLocal = (text) => {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Copied to your local clipboard!");
        };
    </script>
</body>
</html>
