<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Remote Dashboard - Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { cursor: none; } 
        
        .screenshot-container {
            cursor: none;
            position: relative;
            display: inline-block;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        #virtual-cursor {
            position: fixed;
            width: 24px;
            height: 24px;
            border: 2px solid #3b82f6;
            background: rgba(59, 130, 246, 0.2); 
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease-out;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        
        #virtual-cursor::after {
            content: '';
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
        }

        #dot {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #ef4444;
            border: 2px solid white;
            border-radius: 50%;
            display: none;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 20;
            box-shadow: 0 0 15px #ef4444;
        }

        .loader-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 30;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-black text-gray-200 p-4 font-sans selection:bg-blue-500/30">

    <div id="virtual-cursor"></div>

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black bg-gradient-to-r from-blue-500 to-indigo-400 bg-clip-text text-transparent italic tracking-tighter">
                    ULTRA-SYNC REALTIME v3.0
                </h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Direct Telegram Feed Mode</p>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="px-4 py-2 bg-gray-900 border border-gray-800 rounded-xl">
                    <span id="sync-time" class="text-xs font-mono text-green-400">⚡ Realtime Ready</span>
                </div>
                <button onclick="requestScreenshot()" class="group relative px-6 py-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-sm transition-all active:scale-95 shadow-lg shadow-blue-500/20 overflow-hidden">
                    <span class="relative z-10 flex items-center gap-2">📸 FORCE REFRESH</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-8">
            <!-- Screen Area -->
            <div class="xl:col-span-3 text-center">
                <div class="screenshot-container group" id="container">
                    <div id="loader" class="loader-overlay">
                        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
                        <p class="text-xs font-bold text-blue-400 animate-pulse">FETCHING FROM TELEGRAM...</p>
                    </div>
                    <!-- Direct Dynamic Source -->
                    <img id="screenshot" src="https://placehold.co/1920x1080/111/333?text=Connecting+to+Telegram+Feed..." 
                         class="w-full h-auto opacity-0 transition-opacity duration-500 rounded-lg">
                    <div id="dot"></div>
                </div>
            </div>

            <!-- Controls Panel -->
            <div class="space-y-6">
                <div class="bg-gray-900/50 border border-gray-800 p-6 rounded-3xl backdrop-blur-sm">
                    <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-4">Mouse Telemetry</h2>
                    <div id="coords" class="text-4xl font-black text-white mb-2 tabular-nums">0000 : 0000</div>
                    <div class="text-[10px] text-blue-500 font-mono mb-4">MAPPED TO 1920x1080</div>
                    <div class="h-1.5 w-full bg-gray-800 rounded-full overflow-hidden">
                        <div id="progress" class="h-full bg-gradient-to-r from-blue-600 to-indigo-500 w-0 transition-all duration-300"></div>
                    </div>
                </div>

                <div class="bg-gray-900/50 border border-gray-800 p-6 rounded-3xl backdrop-blur-sm">
                    <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-4">Terminal Input</h2>
                    <div class="relative">
                        <input id="typeInput" type="text" placeholder="Type command..." 
                               class="w-full bg-black/50 border border-gray-800 p-4 rounded-2xl text-sm focus:border-blue-500 outline-none transition-all focus:ring-4 focus:ring-blue-500/10 mb-4">
                    </div>
                    <button onclick="sendType()" class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-gray-200 transition-all active:scale-95 shadow-xl shadow-white/5">
                        EXECUTE KEYSTROKES
                    </button>
                </div>

                <div class="p-4 bg-blue-500/5 border border-blue-500/10 rounded-2xl">
                    <p class="text-[10px] text-blue-400 leading-relaxed">
                        <b>Mode:</b> FastSync Active. Dashboard fetches images directly from your Telegram Bot's recent history to bypass GitHub delay.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8235734619:AAEVmjaTSbPBvzKZJuyCOgxXvOb_m5ILWxo";
        const CHAT_ID = "8060968649";
        const img = document.getElementById('screenshot');
        const loader = document.getElementById('loader');
        const vCursor = document.getElementById('virtual-cursor');
        const container = document.getElementById('container');

        // Mouse Tracker
        document.addEventListener('mousemove', (e) => {
            vCursor.style.left = e.clientX + 'px';
            vCursor.style.top = e.clientY + 'px';
            const rect = container.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && 
                e.clientY >= rect.top && e.clientY <= rect.bottom) {
                vCursor.style.transform = 'translate(-50%, -50%) scale(1.2)';
            } else {
                vCursor.style.transform = 'translate(-50%, -50%) scale(1)';
            }
        });

        // REALTIME LOGIC: Fetch directly from Telegram Bot API
        async function fetchLatestFromTelegram() {
            loader.style.display = 'flex';
            try {
                // Step 1: Get latest messages from Bot
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=-1&limit=1`);
                const data = await response.json();
                
                if (data.ok && data.result.length > 0) {
                    const msg = data.result[0].message;
                    // Check if message has a photo
                    if (msg && msg.photo) {
                        const fileId = msg.photo[msg.photo.length - 1].file_id;
                        
                        // Step 2: Get File Path
                        const fileRes = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
                        const fileData = await fileRes.json();
                        
                        if (fileData.ok) {
                            const filePath = fileData.result.file_path;
                            // Step 3: Set Image Source to direct Telegram server URL
                            const directUrl = `https://api.telegram.org/file/bot${BOT_TOKEN}/${filePath}`;
                            
                            // Only update if it's a new image to save bandwidth
                            if (img.src !== directUrl) {
                                img.src = directUrl;
                                document.getElementById('sync-time').innerText = "⚡ Sync: " + new Date().toLocaleTimeString();
                            } else {
                                loader.style.display = 'none';
                            }
                        }
                    }
                }
            } catch (err) {
                console.error("Sync Error:", err);
            }
        }

        function requestScreenshot() {
            sendCommand("/start"); // This triggers the PC to take and send a photo
            setTimeout(fetchLatestFromTelegram, 2000);
        }

        img.onload = () => { 
            loader.style.display = 'none'; 
            img.classList.remove('opacity-0');
        };

        container.addEventListener('mousedown', function(e) {
            const rect = img.getBoundingClientRect();
            const x_pixel = e.clientX - rect.left;
            const y_pixel = e.clientY - rect.top;

            const pc_width = 1920; 
            const pc_height = 1080;

            const final_x = Math.round((x_pixel / rect.width) * pc_width);
            const final_y = Math.round((y_pixel / rect.height) * pc_height);

            document.getElementById('coords').innerText = `${final_x.toString().padStart(4,'0')} : ${final_y.toString().padStart(4,'0')}`;
            
            const dot = document.getElementById('dot');
            dot.style.display = 'block';
            dot.style.left = x_pixel + 'px';
            dot.style.top = y_pixel + 'px';

            vCursor.style.background = 'rgba(239, 68, 68, 0.5)';
            setTimeout(() => { vCursor.style.background = 'rgba(59, 130, 246, 0.2)'; }, 150);

            sendCommand(`/click ${final_x} ${final_y}`);
        });

        function sendType() {
            const input = document.getElementById('typeInput');
            if(input.value) {
                sendCommand(`/type ${input.value}`);
                input.value = '';
            }
        }

        function sendCommand(cmd) {
            document.getElementById('progress').style.width = '100%';
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(cmd)}`)
            .then(() => {
                setTimeout(() => {
                    fetchLatestFromTelegram();
                    document.getElementById('progress').style.width = '0%';
                }, 2500); 
            });
        }

        // Auto Poll Telegram every 5 seconds for new photos
        setInterval(fetchLatestFromTelegram, 5000);
        fetchLatestFromTelegram();
    </script>
</body>
</html>
