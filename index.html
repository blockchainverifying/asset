<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote System Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .screen-container { cursor: crosshair; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <!-- Header Section -->
    <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i data-lucide="monitor" class="w-6 h-6 text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Remote <span class="text-blue-500">Admin</span></h1>
            </div>
            <div id="status-indicator" class="flex items-center gap-2 bg-slate-800 px-3 py-1.5 rounded-full text-sm">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500" id="status-dot"></span>
                </span>
                <span id="status-text">Connecting...</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- Left: Live Screen View -->
        <div class="lg:col-span-8 space-y-6">
            <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-2xl">
                <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                    <span class="text-sm font-medium flex items-center gap-2">
                        <i data-lucide="layout" class="w-4 h-4 text-blue-400"></i> Main Display View
                    </span>
                    <span class="text-[10px] uppercase tracking-widest text-slate-500">Live Stream</span>
                </div>
                <div class="relative group screen-container" id="screen-click-area">
                    <img id="main-screen" src="" alt="Waiting for agent..." class="w-full h-auto min-h-[400px] bg-black object-contain" />
                    <div id="screen-placeholder" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900">
                        <i data-lucide="loader-2" class="w-10 h-10 text-slate-700 animate-spin mb-4"></i>
                        <p class="text-slate-500">Awaiting Screen Feed from Python Agent...</p>
                    </div>
                </div>
            </div>

            <!-- Remote Input Controls -->
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
                <h3 class="text-sm font-semibold mb-4 flex items-center gap-2 text-slate-400">
                    <i data-lucide="keyboard" class="w-4 h-4"></i> Remote Typing Command
                </h3>
                <div class="flex gap-3">
                    <input type="text" id="keyboard-input" 
                        placeholder="Type text and press Send..." 
                        class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-sm" />
                    <button id="send-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-medium flex items-center gap-2 transition-all active:scale-95 shadow-lg shadow-blue-900/20">
                        <span>Send</span>
                        <i data-lucide="send" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Right: Sidebar -->
        <div class="lg:col-span-4 space-y-6">
            <!-- Camera Feed -->
            <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-xl">
                <div class="p-4 bg-slate-800/50 border-b border-slate-800 flex items-center gap-2">
                    <i data-lucide="camera" class="w-4 h-4 text-pink-500"></i>
                    <span class="text-sm font-semibold">Webcam Feed</span>
                </div>
                <div class="aspect-video bg-black flex items-center justify-center overflow-hidden">
                    <img id="camera-feed" src="" class="w-full h-full object-cover hidden" />
                    <div id="camera-placeholder" class="text-slate-600 text-xs text-center p-4">
                        Camera offline or access denied
                    </div>
                </div>
            </div>

            <!-- Clipboard History -->
            <div class="bg-slate-900 rounded-2xl border border-slate-800 flex flex-col h-[300px] shadow-xl">
                <div class="p-4 border-b border-slate-800 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i data-lucide="clipboard" class="w-4 h-4 text-yellow-500"></i>
                        <span class="text-sm font-semibold">Clipboard Monitor</span>
                    </div>
                    <span class="text-[10px] text-slate-500 bg-slate-800 px-2 py-0.5 rounded">10 Min Limit</span>
                </div>
                <div class="p-4 flex-1 overflow-y-auto custom-scrollbar space-y-3" id="clipboard-container">
                    <div class="text-slate-500 text-center text-sm mt-10 italic">
                        Clipboard history will appear here...
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- Hardcoded Firebase Config for Remote Deployment ---
        const firebaseConfig = {
            apiKey: "AIzaSyDYbGLAXKaY9uVyNPDCS-bvxsQvPWiLouk",
            authDomain: "sainfoxiya-com-a7733.firebaseapp.com",
            databaseURL: "https://sainfoxiya-com-a7733-default-rtdb.firebaseio.com",
            projectId: "sainfoxiya-com-a7733",
            storageBucket: "sainfoxiya-com-a7733.firebasestorage.app",
            messagingSenderId: "639762867502",
            appId: "1:639762867502:web:826662477ce123110fc6bf",
            measurementId: "G-0Q3FJ4WYZF"
        };

        const appId = 'sainfoxiya-com-a7733';
        const DOC_ID = 'system_state';

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const screenImg = document.getElementById('main-screen');
        const cameraImg = document.getElementById('camera-feed');
        const screenPlaceholder = document.getElementById('screen-placeholder');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const clipboardContainer = document.getElementById('clipboard-container');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const keyboardInput = document.getElementById('keyboard-input');
        const sendBtn = document.getElementById('send-btn');
        const screenArea = document.getElementById('screen-click-area');

        lucide.createIcons();

        async function init() {
            try {
                await auth.signInAnonymously();
                
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('remote_control').doc(DOC_ID);
                
                docRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        updateUI(data);
                    }
                }, (error) => {
                    console.error("Firestore Error:", error);
                    statusText.innerText = "Check Firebase Rules";
                });

                statusText.innerText = "Agent Monitoring Active";
                statusDot.classList.replace('bg-red-500', 'bg-green-500');
            } catch (err) {
                console.error("Init failed:", err);
                statusText.innerText = "Auth Failed";
            }
        }

        function updateUI(data) {
            if (data.screen) {
                screenImg.src = `data:image/jpeg;base64,${data.screen}`;
                screenImg.classList.remove('hidden');
                screenPlaceholder.classList.add('hidden');
            }

            if (data.camera) {
                cameraImg.src = `data:image/jpeg;base64,${data.camera}`;
                cameraImg.classList.remove('hidden');
                cameraPlaceholder.classList.add('hidden');
            }

            if (data.clipboard) {
                const timestamp = data.clipboard_time ? data.clipboard_time.toDate() : new Date();
                const now = new Date();
                const diffMin = (now - timestamp) / 1000 / 60;

                if (diffMin < 10) {
                    clipboardContainer.innerHTML = `
                        <div class="bg-slate-950 border border-slate-800 p-3 rounded-xl">
                            <p class="text-xs text-yellow-100 font-mono break-all">${data.clipboard}</p>
                            <div class="flex justify-between items-center mt-2">
                                <span class="text-[10px] text-slate-500">${timestamp.toLocaleTimeString()}</span>
                                <button onclick="copyToDash('${data.clipboard.replace(/'/g, "\\'")}')" class="text-blue-400 hover:text-blue-300 text-[10px] font-bold">COPY</button>
                            </div>
                        </div>
                    `;
                } else {
                    clipboardContainer.innerHTML = `<div class="text-slate-500 text-center text-sm mt-10 italic">Data expired</div>`;
                }
            }
        }

        async function sendCommand(command) {
            const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('remote_control').doc(DOC_ID);
            await docRef.update({ command: command });
        }

        screenArea.addEventListener('click', (e) => {
            const rect = screenImg.getBoundingClientRect();
            if (rect.width === 0) return;
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            sendCommand({ type: 'click', x, y, time: Date.now() });
        });

        sendBtn.addEventListener('click', () => {
            const text = keyboardInput.value;
            if (text) {
                sendCommand({ type: 'type', text: text, time: Date.now() });
                keyboardInput.value = '';
            }
        });

        window.copyToDash = (text) => {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
        };

        init();
    </script>
</body>
</html>
