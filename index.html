<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Remote - Realtime Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080808; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .screen-view { cursor: crosshair; transition: all 0.2s ease; position: relative; }
        .screen-view:active { transform: scale(0.998); }
        #loading { position: absolute; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10; border-radius: 1.5rem; }
        .click-ripple { position: absolute; width: 20px; height: 20px; border: 2px solid #3b82f6; border-radius: 50%; animation: ripple 0.6s ease-out; pointer-events: none; transform: translate(-50%, -50%); }
        @keyframes ripple { from { transform: translate(-50%, -50%) scale(0); opacity: 1; } to { transform: translate(-50%, -50%) scale(3); opacity: 0; } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-5 glass p-6 rounded-[2.5rem]">
            <div class="flex items-center gap-5">
                <div class="h-14 w-14 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-2xl">
                    <svg viewBox="0 0 24 24" class="h-7 w-7 text-white" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.75 17L9 21h6l-.75-4M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-white tracking-tighter italic">PC LIVE <span class="text-blue-500 underline decoration-2">STREAM</span></h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span id="status-dot" class="h-2 w-2 rounded-full bg-red-500"></span>
                        <span id="status-text" class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em]">Connecting...</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <p id="latency" class="text-[10px] font-mono text-gray-500">DELAY: 0ms</p>
                <button id="refresh-btn" class="bg-white text-black px-8 py-3 rounded-2xl font-black text-xs hover:bg-gray-200 transition-all active:scale-95 shadow-xl uppercase">Manual Refresh</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-10">
            <!-- Screen Area (Yahan Stream Dikhegi) -->
            <div class="lg:col-span-3 space-y-6">
                <div id="screen-container" class="screen-view glass rounded-[2.5rem] overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-white/10 aspect-video group">
                    <div id="loading">
                        <div class="text-center">
                            <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p class="text-xs font-bold text-gray-600 uppercase tracking-widest">Awaiting Live Signal...</p>
                        </div>
                    </div>
                    <!-- Realtime Image Stream -->
                    <img id="display" src="" class="w-full h-full object-contain hidden" draggable="false">
                    
                    <!-- Overlay info -->
                    <div class="absolute bottom-6 left-6 opacity-0 group-hover:opacity-100 transition-opacity bg-black/60 px-4 py-2 rounded-full text-[10px] font-bold text-white uppercase tracking-widest pointer-events-none">
                        Click anywhere to control PC
                    </div>
                </div>
            </div>

            <!-- Side Controls -->
            <div class="space-y-6">
                <div class="glass p-8 rounded-[2.5rem]">
                    <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-6">Run Command</h2>
                    <input id="cmd-in" type="text" placeholder="e.g. start chrome" class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl text-sm mb-4 focus:border-blue-500 outline-none font-mono text-blue-400">
                    <button id="cmd-btn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-xs hover:bg-blue-500 shadow-lg shadow-blue-500/20">EXECUTE CMD</button>
                </div>

                <div class="glass p-8 rounded-[2.5rem]">
                    <h2 class="text-[10px] font-black text-orange-500 uppercase tracking-[0.2em] mb-6">Type Text</h2>
                    <textarea id="type-in" placeholder="Write text to send..." class="w-full bg-black/50 border border-white/10 p-4 rounded-2xl text-sm mb-4 focus:border-orange-500 outline-none resize-none font-medium" rows="2"></textarea>
                    <button id="type-btn" class="w-full py-4 bg-white text-black rounded-2xl font-black text-xs hover:bg-gray-200">SEND KEYSTROKES</button>
                </div>
                
                <div class="p-4 text-center">
                    <p class="text-[10px] text-gray-600 font-bold uppercase tracking-widest">Resolution: 1920x1080 (Mapped)</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYbGLAXKaY9uVyNPDCS-bvxsQvPWiLouk",
            authDomain: "sainfoxiya-com-a7733.firebaseapp.com",
            databaseURL: "https://sainfoxiya-com-a7733-default-rtdb.firebaseio.com",
            projectId: "sainfoxiya-com-a7733",
            storageBucket: "sainfoxiya-com-a7733.firebasestorage.app",
            messagingSenderId: "639762867502",
            appId: "1:639762867502:web:826662477ce123110fc6bf",
            measurementId: "G-0Q3FJ4WYZF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "pc-remote-pro";

        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const display = document.getElementById('display');
        const loading = document.getElementById('loading');
        const latencyEl = document.getElementById('latency');

        function setStatus(msg, color) {
            statusText.innerText = msg;
            statusDot.className = `h-2 w-2 rounded-full ${color}`;
        }

        // 1. Auth Login (Realtime ke liye zaroori hai)
        signInAnonymously(auth)
            .then(() => setStatus("Streaming Ready", "bg-green-500 animate-pulse"))
            .catch(err => {
                console.error(err);
                setStatus("Auth Error", "bg-red-500");
            });

        // 2. Continuous Stream Watcher
        // Jab bhi Python script naya screenshot upload karegi, yeh turant update ho jayega
        const displayDoc = doc(db, 'artifacts', appId, 'public', 'data', 'display', 'display');
        onSnapshot(displayDoc, (snap) => {
            if (snap.exists()) {
                const startTime = Date.now();
                display.src = snap.data().base64;
                
                display.onload = () => {
                    display.classList.remove('hidden');
                    loading.classList.add('hidden');
                    const delay = Date.now() - startTime;
                    latencyEl.innerText = `SYNC: ${delay}ms`;
                };
            }
        });

        // 3. Command Pusher (Click/Type/Cmd)
        async function pushCommand(type, data) {
            try {
                const col = collection(db, 'artifacts', appId, 'public', 'data', 'commands');
                await addDoc(col, { 
                    type, 
                    data, 
                    executed: false, 
                    timestamp: serverTimestamp() 
                });
            } catch (e) { 
                console.error("Push failed", e);
            }
        }

        // Click Handling on Stream Area
        document.getElementById('screen-container').onclick = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            // Scaling logic: Browser pixels se PC resolution (1920x1080) mein convert karna
            const x = Math.round(((e.clientX - rect.left) / rect.width) * 1920);
            const y = Math.round(((e.clientY - rect.top) / rect.height) * 1080);
            
            // Visual feedback (Ripple)
            const rip = document.createElement('div');
            rip.className = 'click-ripple';
            rip.style.left = (e.clientX - rect.left) + 'px';
            rip.style.top = (e.clientY - rect.top) + 'px';
            e.currentTarget.appendChild(rip);
            setTimeout(() => rip.remove(), 600);

            // Send Click to PC via Firestore
            pushCommand('click', { x, y });
        };

        // UI Event Listeners
        document.getElementById('cmd-btn').onclick = () => {
            const el = document.getElementById('cmd-in');
            if(el.value) { pushCommand('cmd', el.value); el.value = ''; }
        };

        document.getElementById('type-btn').onclick = () => {
            const el = document.getElementById('type-in');
            if(el.value) { pushCommand('type', el.value); el.value = ''; }
        };

        document.getElementById('refresh-btn').onclick = () => pushCommand('refresh', {});

    </script>
</body>
</html>
